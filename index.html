<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaste Planten – Kwekerij Muijderman</title>
<link rel="stylesheet" href="css/shared.css">
<link rel="stylesheet" href="css/vaste-planten.css">
</head>
<body>

<nav>
  <a href="./index.html" class="actief">🌿 Planten</a>
  <a href="./bomen-heesters.html">🌳 Bomen</a>
  <a href="./favorieten.html">★ Favorieten</a>
</nav>

<header>
  <p class="sub">Kwekerij Muijderman · Veldhoven</p>
  <h1><em>Vaste planten</em> catalogus</h1>
  <p id="hdr-count"></p>
</header>

<div class="toolbar">
  <div class="filters" id="filters">
    <button class="active" data-filter="all">Alles</button>
    <button data-filter="hoog">🌿 Hoog</button>
    <button data-filter="middel">🌿 Middel</button>
    <button data-filter="laag">🌿 Laag</button>
    <button data-filter="bodembedekker">🟫 Bodembedekkers</button>
    <button data-filter="siergras">🌾 Siergrassen</button>
    <button data-filter="klimplant">🌿 Klimplanten</button>
    <button data-filter="voorjaar">🌱 Voorjaar</button>
    <button data-filter="zomer">☀️ Zomer</button>
    <button data-filter="herfst">🍂 Herfst</button>
    <button data-filter="favorieten">★ Favorieten</button>
    <span class="count" id="count"></span>
  </div>
  <div class="filters" id="filters-licht">
    <button class="active" data-licht="all">Alle licht</button>
    <button data-licht="zon">☀️ Zon</button>
    <button data-licht="halfschaduw">🌤 Halfschaduw</button>
    <button data-licht="schaduw">🌑 Schaduw</button>
  </div>
  <input id="search" type="search" placeholder="Zoek op naam…">
</div>

<div class="grid" id="grid"></div>
<div class="loader" id="loader"></div>
<footer>Kwekerij Muijderman · Volmolenweg 9 Veldhoven · do/vr/za 9–17u</footer>

<script src="js/shared.js"></script>
<script src="data/vaste-planten.js"></script>
<script src="js/vaste-planten.js"></script>
</body>
</html>
