<header>

  <h1><em>Bomen &amp; heesters</em> catalogus</h1>

    <button data-filter="conifeer">🌲 Conifeers</button>

<div class="loader" id="loader"></div>
<footer>Kwekerij Muijderman · Volmolenweg 9 Veldhoven · do/vr/za 9–17u</footer>

<script src="data/bomen-heesters.js"></script>
