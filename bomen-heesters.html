  { n:"Magnolia", l:"Magnolia", h:"middel", cat:"boom", blad:"bladverliezend", s:"voorjaar", b:"mrt–mei", c:"#e8c0d0", licht:"zon", d:"Zon tot halfschaduw, voedselrijke vochtige grond zonder kalk. Indrukwekkende bloemen op kaal hout in het vroege voorjaar. Plant op beschutte plek — bloemen gevoelig voor late vorst. Grandiflora-soorten zijn groenblijvend.", cv:[{name:"stellata",kleur:"wit",hoogte:"3m",tip:"Stervormige bloemen, vroegst en kleinst"},{name:"stellata 'Royal Star'",kleur:"wit",hoogte:"3m",tip:"Meer bloemblaadjes dan de soort, rijkere bloei"},{name:"x soulangeana",kleur:"roze-wit",hoogte:"6m",tip:"Kelkvormige bloemen, meest robuust"},{name:"'Susan'",kleur:"roodpaars",hoogte:"4m",tip:"Laat bloeiend — minder kans op vorstschade"},{name:"'Black Tulip'",kleur:"donkerpaars-rood",hoogte:"5m",tip:"Donkerste kleur, grote tulpvormige bloemen"},{name:"'Yellow Bird'",kleur:"helder geel",hoogte:"8m",tip:"Frisse gele bloemen, bloeit na bladuitlopen"},{name:"loebneri 'Merrill'",kleur:"wit",hoogte:"8m",tip:"Witte stervormige bloemen, snelle groeier"},{name:"kobus",kleur:"wit",hoogte:"10m",tip:"Japanse magnolia, sterk en bestendig"},{name:"sieboldii",kleur:"wit + rode meeldraden",hoogte:"5m",tip:"Bloeit in juni — zomermagnolia"},{name:"'Aphrodite'",kleur:"roze",hoogte:"5m",tip:"Compacte habitus, rijk bloeiend"},{name:"'Heaven Sent'",kleur:"roze-wit",hoogte:"4m",tip:"Grote bloemen, lang bloeiend"},{name:"'March-Till-Frost'",kleur:"roze",hoogte:"4m",tip:"Herhaalbloei van voorjaar tot herfst"},{name:"grandiflora 'Little Gem'",kleur:"wit",hoogte:"6m",tip:"Groenblijvende magnolia, compacte zuilvorm"},{name:"grandiflora 'Kay Parris'",kleur:"wit",hoogte:"8m",tip:"Groenblijvend, bloeit al jong en lang"},{name:"grandiflora 'Goliath'",kleur:"wit groot",hoogte:"10m",tip:"Groenblijvend, enorme witte bloemen"}]},

  { n:"Weigela", l:"Weigela florida", h:"klein", cat:"heester", blad:"bladverliezend", s:"voorjaar", b:"mei–jun", c:"#dd5577", licht:"zon", d:"Volle zon, goed gedraineerde humeuze grond. Trompetbloemen massaal in mei-juni, soms nabloeien in september. Trekt hommels en bijen. Snoei na bloei door oude takken aan de basis te verwijderen.", cv:[{name:"'Bristol Ruby'",kleur:"robijnrood",hoogte:"2m",tip:"Meest geteelde, robuust en betrouwbaar"},{name:"'Briant Rubidor'",kleur:"rood + geel blad",hoogte:"1.5m",tip:"Geel blad — sterk contrast"},{name:"florida 'Nana Purpurea'",kleur:"roze-rood + paars blad",hoogte:"1.2m",tip:"Compact paarsblad met roze bloem"},{name:"florida 'Variegata'",kleur:"roze + bont blad",hoogte:"1.5m",tip:"Groen-wit-creme bontblad, pastelroze bloem"},{name:"middendorffiana",kleur:"geel",hoogte:"1.5m",tip:"Zeldzame gele weigela — aandachtstrekker"},{name:"'Rosea'",kleur:"roze",hoogte:"2m",tip:"Klassiek roze, overvloedige bloei"}]},
  { n:"Spiraea", l:"Spiraea", h:"klein", cat:"heester", blad:"bladverliezend", s:"voorjaar", b:"apr–jun", c:"#f5c0d8", licht:"zon", d:"Volle zon, vrijwel elke goed gedraineerde grond. Fijnbladige struik met wolkige bloemschermen. Soorten die op oud hout bloeien in het voorjaar direct na de bloei snoeien; zomerbloeiers in het voorjaar.", cv:[{name:"nipponica 'Snowmound'",kleur:"wit",hoogte:"1.5m",tip:"Massale witte bloei in mei, fonteinsgewijs"},{name:"cinerea 'Grefsheim'",kleur:"wit",hoogte:"2m",tip:"Fonteinsgewijs, vroegste witte spiraea"},{name:"arguta",kleur:"wit",hoogte:"2m",tip:"Bruidssluier — overhangende witte bloemtakken"},{name:"x vanhouttei",kleur:"wit",hoogte:"2m",tip:"Klassieke bruidsspiraea, overhangende takken"},{name:"japonica 'Little Princess'",kleur:"roze",hoogte:"0.8m",tip:"Compactste rozerode — ideaal voor rand"},{name:"japonica 'Goldflame'",kleur:"roze + goudgeel blad",hoogte:"1m",tip:"Jonge blaadjes vuurrood — opvallend"},{name:"japonica 'Golden Princess'",kleur:"roze + goudgeel blad",hoogte:"0.8m",tip:"Compact goudblad met roze bloem"},{name:"japonica 'Albiflora'",kleur:"wit",hoogte:"0.8m",tip:"Witte Japanse spiraea, compact"},{name:"betulifolia 'Thor'",kleur:"wit + oranje herfstblad",hoogte:"0.8m",tip:"Bijzondere herfstkleur oranje-rood"},{name:"bumalda 'Anthony Waterer'",kleur:"karmijnrood",hoogte:"1m",tip:"Klassieke rode spiraea, lange bloeiseizoen"}]},
  { n:"Vlier", l:"Sambucus nigra", h:"middel", cat:"heester", blad:"bladverliezend", s:"zomer", b:"jun–jul", c:"#330044", licht:"zon", d:"Zon tot halfschaduw, voedselrijke grond. Inheemse struik met geurende witte schermbloemhoofdjes gevolgd door zwarte bessen. Aantrekkelijk voor vogels. Siercultivars met donkerrood of ingesneden blad.", cv:[{name:"nigra",kleur:"wit",hoogte:"6m",tip:"Wilde vorm — snelst, meeste bessen voor vogels"},{name:"'Black Beauty'",kleur:"zwart-rood blad + roze bloemen",hoogte:"3m",tip:"Diepste blad met roze bloemen — sterk contrast"},{name:"'Black Lace'",kleur:"zwart ingesneden blad + roze",hoogte:"3m",tip:"Kantachtig effect door diep ingesneden blad"},{name:"'Black Tower'",kleur:"donkerrood blad + roze",hoogte:"3m",tip:"Smalzuilvormig — ideaal voor smalle stroken"},{name:"'Golden Tower'",kleur:"goudgeel blad + wit",hoogte:"3m",tip:"Gele zuilvorm van vlier"},{name:"nigra 'Haschberg'",kleur:"wit + zwarte bessen",hoogte:"4m",tip:"Bessenrijk, ook geschikt als vruchtboom"},{name:"racemosa",kleur:"geel-wit",hoogte:"4m",tip:"Rode bessen — hoger ornamenteel effect"},{name:"racemosa 'Sutherland Gold'",kleur:"geel-wit + goudgeel blad",hoogte:"3m",tip:"Goudgeel blad, eetbare rode bessen"}]},
  { n:"Forsythia", l:"Forsythia x intermedia", h:"klein", cat:"heester", blad:"bladverliezend", s:"voorjaar", b:"mrt–apr", c:"#f0d020", licht:"zon", d:"Volle zon, vrijwel elke grond. Eerste gele bloemexplosie van het jaar op kaal hout in maart. Robuust en onverslijtbaar. Na bloei direct snoeien om voldoende nieuw hout voor het volgende jaar te vormen.", cv:[{name:"'Lynwood Variety'",kleur:"goud-geel",hoogte:"2.5m",tip:"Rijkst bloeiend, goed vertakkend"},{name:"'Week-End'",kleur:"diepgeel",hoogte:"1.5m",tip:"Compact, geschikt voor kleine tuin"},{name:"interm. 'Spectabilis'",kleur:"diepgeel",hoogte:"2.5m",tip:"Klassieke grote forsythia, uitbundig bloeiend"}]},
  { n:"Taxus", l:"Taxus baccata", h:"middel", cat:"conifeer", blad:"groenblijvend", s:"herfst", b:"aug–okt", c:"#cc2200", licht:"schaduw", d:"Schaduw tot volle zon, elke goed gedraineerde grond. De meest waardevolle haagconifeer voor Nederland. Donkergroen naaldblad, rode bessen (giftig!). Verdraagt diep snoeien op oud hout. Extreem langlevend.", cv:[{name:"baccata",kleur:"rode bessen",hoogte:"15m",tip:"Solitair kan monumentaal worden"},{name:"baccata 'Fastigiata Robusta'",kleur:"donkergroen",hoogte:"8m",tip:"Zuilvorm, populaire haagbasis"},{name:"baccata 'Fastigiata Aurea'",kleur:"goudgeel",hoogte:"6m",tip:"Goudgele zuilvorm — vrolijk accentpunt"},{name:"baccata 'Repandens'",kleur:"donkergroen",hoogte:"0.6m",tip:"Breed kruipend — ideaal als bodembedekker"}]},
  { n:"Spar", l:"Picea pungens", h:"groot", cat:"conifeer", blad:"groenblijvend", s:"zomer", b:"nvt", c:"#5577aa", licht:"zon", d:"Volle zon, vochtige grond. Picea omvat de blauwspar (pungens), oosterse spar (orientalis), omorika en de gewone fijnspar (abies). Staalblauwe of donkergroene naalden, jaarrond decoratief.", cv:[{name:"pungens 'Glauca'",kleur:"staalblauw",hoogte:"15m",tip:"Blauwspar — sterkste sierwaarde"},{name:"pungens 'Hoopsii'",kleur:"zilverblauw",hoogte:"12m",tip:"Zilverachtig blauw, statig en compact"},{name:"pungens 'Glauca Globosa'",kleur:"staalblauw",hoogte:"1.5m",tip:"Bolvormige blauwspar — ideaal in kleine tuin"},{name:"glauca 'Conica'",kleur:"heldergroen",hoogte:"2m",tip:"Kegelvorm, ideaal voor kleine tuin"},{name:"glauca 'Echiniformis'",kleur:"blauwgroen",hoogte:"0.5m",tip:"Langzaam groeiende bolspar, rotstuin"},{name:"orientalis 'Aureospicata'",kleur:"goudgeel jonge scheuten",hoogte:"10m",tip:"Gele scheuten in voorjaar — bijzonder"},{name:"omorika",kleur:"donkergroen + zilverachtig",hoogte:"20m",tip:"Servische spar — slanke zuilvorm, beste spar voor kleine ruimte"},{name:"abies 'Little Gem'",kleur:"helder groen",hoogte:"0.5m",tip:"Miniatuur fijnspar, bolvorm, rotstuin"}]},
  { n:"Den", l:"Pinus", h:"groot", cat:"conifeer", blad:"groenblijvend", s:"zomer", b:"nvt", c:"#3a6030", licht:"zon", d:"Volle zon, arme goed gedraineerde grond. Dennen voor wind, kustverdediging en droge plekken. Interessante naaldbundels en decoratieve dennenappels. Goed aanpassingsvermogen.", cv:[{name:"sylvestris",kleur:"blauwgroen",hoogte:"25m",tip:"Grove den — droge zandgrond, meest inheems"},{name:"nigra nigra",kleur:"donkergroen",hoogte:"20m",tip:"Zwarte den — kustbestendiger dan sylvestris"},{name:"nigra 'Green Tower'",kleur:"donkergroen",hoogte:"6m",tip:"Zuilvormige zwarte den — smal en imposant"},{name:"mugo mughus",kleur:"donkergroen",hoogte:"1m",tip:"Kruipende bergden — ideaal voor lage beplanting"},{name:"mugo 'Mops'",kleur:"donkergroen",hoogte:"1.5m",tip:"Bolvormige bergden — rotstuin"},{name:"mugo 'Carsten'",kleur:"donkergroen → goudgeel winter",hoogte:"0.8m",tip:"Wintergoud — naalden worden geel in de kou"},{name:"mugo 'Ophir'",kleur:"goudgeel",hoogte:"1m",tip:"Gele naalden jaarrond, compact"},{name:"mugo 'Varella'",kleur:"donkergroen",hoogte:"1m",tip:"Breed uitlopend, lage beplanting"},{name:"parviflora 'Tempelhof'",kleur:"blauwgroen",hoogte:"3m",tip:"Japanse witte den, zachte blauwgroene naalden"},{name:"strobus 'Blue Shag'",kleur:"zilverblauw",hoogte:"1m",tip:"Compact blauwgroene naalden, breed bolvormig"},{name:"strobus 'Radiata'",kleur:"lichtgroen",hoogte:"2m",tip:"Dwergvorm zachte naald, sfeervolle textuur"},{name:"pumila 'Glauca'",kleur:"staalblauw",hoogte:"1m",tip:"Dwerg-siberische den, bolvorm"},{name:"densiflora 'Alice Verkade'",kleur:"heldergroen",hoogte:"1.5m",tip:"Japanse rode den, bolvorm"},{name:"thunbergii 'Thunderhead'",kleur:"donkergroen + wit kaarsen",hoogte:"2m",tip:"Witte kaarsen als sierwaarde in het voorjaar"}]},
  { n:"Buxus", l:"Buxus sempervirens", h:"klein", cat:"conifeer", blad:"groenblijvend", s:"zomer", b:"apr–mei", c:"#2d5a2d", licht:"halfschaduw", d:"Halfschaduw, kalkrijke goed gedraineerde grond. Dé klassieke snoeiheester. Kleine glanzende bladjes, accepteert elke snoei. Let op buxusmot (Cydalima perspectalis) — tijdig behandelen. Sempervirens is meest kwetsbaar; microphylla iets robuuster.", cv:[{name:"sempervirens",kleur:"geel bloem (onopvallend)",hoogte:"5m",tip:"Ongesnoeid boom, gesnoeid perfecte bol of haag"},{name:"sempervirens 'Suffruticosa'",kleur:"donkergroen",hoogte:"1m",tip:"Compactste cultivar voor lage randen"},{name:"microphylla 'Faulkner'",kleur:"lichtgroen",hoogte:"1.5m",tip:"Robuuster tegen buxusmot dan sempervirens"}]},
  // BH-1: Populaire sierbomen
  { n:"Sierappel / Appel", l:"Malus domestica", h:"middel", cat:"boom", blad:"bladverliezend", s:"voorjaar", b:"apr–mei", c:"#f8d0b0", licht:"zon", d:"Volle zon, goed doorlatende humeuze grond. Prachtige roze of witte bloesem in het voorjaar. Muijderman voert zowel sierappels als fruitappels. Plant twee verschillende cultivars voor goede bestuiving en vruchtzetting.", cv:[{name:"'Elstar'",kleur:"roze-wit bloesem + geel-rood fruit",hoogte:"4m",tip:"Meest geteelde fruitappel, goed van smaak"},{name:"'Cox Orange Pippin'",kleur:"roze-wit bloesem + oranje fruit",hoogte:"4m",tip:"Klassieke smaakappel, vraagt goede zorg"},{name:"'James Grieve'",kleur:"wit-roze + geel-rood",hoogte:"4m",tip:"Vroeg oogstbare zomerappel"},{name:"'Jonagold'",kleur:"wit-roze + geel-rood",hoogte:"4m",tip:"Triploid — heeft twee bestuivers nodig"},{name:"'Gold Sensation'",kleur:"wit bloesem + goud fruit",hoogte:"4m",tip:"Modern goudgeel vruchtvlees, smaakvol"},{name:"'Notarisappel'",kleur:"wit bloesem + rood fruit",hoogte:"4m",tip:"Traditionele Nederlandse streekappel"},{name:"d. 'Collina'",kleur:"lichtroze bloesem",hoogte:"5m",tip:"Zuilvormige appel — smal en produktief"}]},
  { n:"Lijsterbes", l:"Sorbus aucuparia", h:"middel", cat:"boom", blad:"bladverliezend", s:"herfst", b:"aug–nov", c:"#e84020", licht:"zon", d:"Volle zon tot halfschaduw, vrijwel elke grond. Witte bloemschermen in mei, rijke rode bessenclusters in de herfst. Populair bij vogels. Één van de meest decoratieve inheemse bomen.", cv:[{name:"aucuparia",kleur:"rood bessen",hoogte:"15m",tip:"Wilde vorm — sterk, inheems, vogelvriendelijk"},{name:"'Grananatnaja'",kleur:"oranje-rode bessen",hoogte:"6m",tip:"Grote bessen, compact en sterk"},{name:"cashmiriana",kleur:"witte bessen",hoogte:"6m",tip:"Unieke witte bessen — zeldzaam en elegant"},{name:"arnoldiana 'Dodong'",kleur:"oranje bessen",hoogte:"8m",tip:"Sierlijkste vorm, fraaie herfstkleur"}]},
  { n:"Meidoorn", l:"Crataegus monogyna", h:"middel", cat:"boom", blad:"bladverliezend", s:"voorjaar", b:"mei", c:"#f8f0f0", licht:"zon", d:"Volle zon, vrijwel elke grond. Inheemse boom of struik met witte of roze bloesem in mei. Harde rode vruchten (meidoornbessen) in de herfst — populair bij vogels. Uitstekende heg- en windsingel.", cv:[{name:"monogyna",kleur:"wit",hoogte:"8m",tip:"Inheemse eenstijlige meidoorn — hekvast en vogelrijk"},{name:"laevigata",kleur:"wit",hoogte:"7m",tip:"Tweestijlige meidoorn, meer bessen"},{name:"laev. 'Paul's Scarlet'",kleur:"diepbloeirood gevuld",hoogte:"7m",tip:"Gevuld felrood — spectaculairste meidoorn"}]},
  { n:"Sierpeer", l:"Pyrus calleryana", h:"middel", cat:"boom", blad:"bladverliezend", s:"voorjaar", b:"apr", c:"#f0f0f0", licht:"zon", d:"Volle zon, vrijwel elke grond inclusief natte en droge posities. Wolkige witte bloesem vroeg in het voorjaar op kaal hout. Glanzend blad met prachtige rode herfstkleur. Ook fruitperen (communis) voor smakelijke vruchten.", cv:[{name:"calleryana 'Chanticleer'",kleur:"wit",hoogte:"10m",tip:"Smalzuilvormige sierpeer, best voor straat/tuin"},{name:"comm. 'Conference'",kleur:"wit bloesem + groen fruit",hoogte:"5m",tip:"Zelfbestuivend, betrouwbare fruitpeer"},{name:"comm. 'Doyenne de Comice'",kleur:"wit bloesem + geel fruit",hoogte:"5m",tip:"Heerlijkste fruitpeer, vraagt bestuiver"},{name:"comm. 'Gieser Wildeman'",kleur:"wit bloesem + rood fruit",hoogte:"5m",tip:"Stoofpeer, rode kleur bij koken"},{name:"pyrifolia 'Hosui'",kleur:"wit bloesem + bruin fruit",hoogte:"4m",tip:"Aziatische peer — knapperig en sappig"},{name:"pyrifolia 'Niitaka'",kleur:"wit bloesem + geel-bruin",hoogte:"4m",tip:"Aziatische peer, grote vruchten"}]},
  { n:"Paardekastanje", l:"Aesculus", h:"groot", cat:"boom", blad:"bladverliezend", s:"voorjaar", b:"mei", c:"#ff8844", licht:"zon", d:"Volle zon, diepe vochtige grond. Opvallende kaarsen in het voorjaar. De rode cultivar carnea 'Briotii' blijft kleiner. Parviflora en pavia zijn struikvormen voor kleine tuinen.", cv:[{name:"carnea 'Briotii'",kleur:"donkerrood",hoogte:"10m",tip:"Rode paardekastanje — compacter dan hippocastanum"},{name:"parviflora",kleur:"wit",hoogte:"3m",tip:"Struikvorm — bloeit als laatste in zomer (jul–aug)"},{name:"pavia 'Humilis'",kleur:"rood",hoogte:"2m",tip:"Rode struikkaestanje, compact"}]},
  // BH-2: Grote loofbomen
  { n:"Linde", l:"Tilia", h:"groot", cat:"boom", blad:"bladverliezend", s:"zomer", b:"jun–jul", c:"#c8e080", licht:"zon", d:"Volle zon tot halfschaduw, vochtige voedselrijke grond. Geurige gele bloempluimen in juni-juli, geliefd bij bijen. Klassieke laan- en parkboom. Kan oud worden. Europaea is meest geteelde stadsboom.", cv:[{name:"europaea 'Pallida'",kleur:"lichtgeel geurend",hoogte:"25m",tip:"Meest geteelde laanlinde — breed schermvormig"},{name:"euchlora",kleur:"geel geurend",hoogte:"20m",tip:"Krimse linde — glanzend blad, minder bladluis"},{name:"cordata",kleur:"geel geurend",hoogte:"20m",tip:"Kleinbladige linde — iets compacter dan europaea"},{name:"platyphyllos",kleur:"geel geurend",hoogte:"25m",tip:"Grootbladige linde — iets vroeger bloeiend"}]},
  { n:"Robinia / Valse acacia", l:"Robinia pseudoacacia", h:"groot", cat:"boom", blad:"bladverliezend", s:"zomer", b:"jun", c:"#f8f0cc", licht:"zon", d:"Volle zon, droge tot matig vochtige grond. Geurende witte bloemtrossen in juni. Snelle groeier, tolkenboom. 'Frisia' met goudgeel blad is een van de meest kleurrijke siervormen.", cv:[{name:"pseudoacacia",kleur:"wit geurend",hoogte:"20m",tip:"Wilde vorm — snelgroeiend, droogtetolerant"},{name:"'Frisia'",kleur:"geel-groen blad",hoogte:"15m",tip:"Goudgeel blad jaarrond — sterk contrast"},{name:"'Umbraculifera'",kleur:"wit",hoogte:"6m",tip:"Bolacacia — bolronde kroon zonder snoei"}]},
  { n:"Gleditsia / Valse christusdoorn", l:"Gleditsia triacanthos", h:"groot", cat:"boom", blad:"bladverliezend", s:"zomer", b:"jun–jul", c:"#c8d880", licht:"zon", d:"Volle zon, vrijwel elke grond. Fijn geveerd blad geeft luchtige schaduw. Droogtetolerant en luchtvervuiling-resistent. Inermis = doornloos. 'Sunburst' met goud-geel blad is sierlijk.", cv:[{name:"triacanthos inermis",kleur:"geel-groen herfst",hoogte:"15m",tip:"Doornloos — veilig in de tuin"},{name:"'Sunburst'",kleur:"goudgeel jonge blaadjes",hoogte:"12m",tip:"Goudgele scheuten, luchtig en elegant"},{name:"'Rubylace'",kleur:"bronzrood blad",hoogte:"10m",tip:"Roodbruin blad in het seizoen, opvallend"}]},
  { n:"Els", l:"Alnus incana", h:"groot", cat:"boom", blad:"bladverliezend", s:"voorjaar", b:"feb–mrt", c:"#a0803a", licht:"zon", d:"Volle zon tot halfschaduw, natte en zware grond. Katjes vroeg in het voorjaar. Stikstofbinder via wortelknolletjes — verbetert arme grond. Ideaal langs water of in natte hoeken.", cv:[{name:"incana",kleur:"bruine katjes",hoogte:"20m",tip:"Winterkatjes al in februari — vroegste boombloeier"},{name:"glutinosa",kleur:"bruine katjes",hoogte:"20m",tip:"Zwarte els — voor natte tot drassige plekken"},{name:"cordata",kleur:"bruine katjes",hoogte:"25m",tip:"Hartbladige els — ook voor drogere standplaatsen"}]},
  { n:"Plataan", l:"Platanus hispanica", h:"groot", cat:"boom", blad:"bladverliezend", s:"herfst", b:"okt–nov", c:"#a0c060", licht:"zon", d:"Volle zon, elke goed gedraineerde grond. Majestueuze park- en laanboom met kenmerkende gevlekte schors (groen-geel-bruin). Verdraagt luchtvervuiling en snoei goed. Niet voor kleine tuinen.", cv:[{name:"hispanica",kleur:"geelbruin herfst",hoogte:"35m",tip:"Klassieke plataan — uitsluitend voor grote ruimtes"},{name:"orientalis",kleur:"geelbruin herfst",hoogte:"30m",tip:"Oosterse plataan — dieper ingesneden blad"}]},
  // BH-3: Herfst/sier bomen
  { n:"Amberboom", l:"Liquidambar styraciflua", h:"groot", cat:"boom", blad:"bladverliezend", s:"herfst", b:"sep–nov", c:"#d04020", licht:"zon", d:"Volle zon, vochtige zure grond. Één van de schitterendste herfstkleur-bomen: rood, oranje, paars en geel tegelijk op één boom. Ster-vormig blad. Goed voor natte plekken.", cv:[{name:"styraciflua",kleur:"rood-oranje-paars herfst",hoogte:"25m",tip:"Spectaculairste herfstkleur van alle bomen"},{name:"'Worplesdon'",kleur:"oranje-paars herfst",hoogte:"15m",tip:"Compact en betrouwbaar rood in de herfst"},{name:"'Slender Silhouette'",kleur:"oranje-rood herfst",hoogte:"15m",tip:"Smalzuilvorm — herfstkleur in kleine ruimte"},{name:"'Gumball'",kleur:"rood-oranje herfst",hoogte:"3m",tip:"Bolamberboom op stam — voor kleine tuinen"},{name:"'Autumn Color Globe'",kleur:"rood herfst",hoogte:"4m",tip:"Bolvorm — rijke herfstkleur compact"}]},
  { n:"IJzerhoutboom", l:"Parrotia persica", h:"middel", cat:"boom", blad:"bladverliezend", s:"herfst", b:"feb + sep–nov", c:"#c84020", licht:"zon", d:"Zon tot halfschaduw, vrijwel elke grond. Rode bloemtjes op kaal hout in februari. Prachtige herfstkleur: oranje, rood, geel. Gevlekte schors sierlijk in de winter. Betrouwbaar en weinig onderhoud.", cv:[{name:"persica",kleur:"rood bloem + herfstkleur",hoogte:"10m",tip:"Breed uitgroeiend, spectaculaire herfstkleur"},{name:"'Bella'",kleur:"rood herfst",hoogte:"6m",tip:"Compact, vroeg intense rode herfstkleur"},{name:"'Vanessa'",kleur:"oranje-rood herfst",hoogte:"8m",tip:"Zuilvormig, ideaal voor smallere stroken"},{name:"'Persian Spire'",kleur:"rood herfst",hoogte:"8m",tip:"Smalste zuilvorm van parrotia"},{name:"'Jodrell Bank'",kleur:"oranje-geel herfst",hoogte:"8m",tip:"Brede spreidende groei, rijke herfstkleur"}]},
  { n:"Judasboom", l:"Cercis canadensis", h:"middel", cat:"boom", blad:"bladverliezend", s:"voorjaar", b:"apr–mei", c:"#dd5599", licht:"zon", d:"Volle zon, goed gedraineerde grond. Roze tot rode bloemen direct op de stam en takken, vóór het blad. Hartvorming blad. Canadensis hardier dan siliquastrum. Prachtige solitaire boom.", cv:[{name:"canadensis",kleur:"roze-paars",hoogte:"8m",tip:"Hardier en groter dan siliquastrum"},{name:"canadensis 'Forest Pansy'",kleur:"roze + donkerpaars blad",hoogte:"8m",tip:"Donker bordeauxrood blad — sierwaarde heel seizoen"},{name:"canadensis 'Hearts of Gold'",kleur:"roze + goudgeel blad",hoogte:"7m",tip:"Goudgeel blad in de zomer — zeldzaam bijzonder"},{name:"canadensis 'The Rising Sun'",kleur:"roze + oranje→geel blad",hoogte:"6m",tip:"Kleurwisselend blad: oranje bij uitlopen, geel in zomer"},{name:"canadensis 'Black Pearl'",kleur:"roze + bijna zwart blad",hoogte:"7m",tip:"Diepste blad, sterk contrast met roze bloem"},{name:"canadensis 'Lavender Twist'",kleur:"paars-roze",hoogte:"3m",tip:"Treurboom op stam — unieke huilende vorm"},{name:"chinensis 'Avondale'",kleur:"dieppaars-roze",hoogte:"3m",tip:"Rijkst bloeiend compact — trossen langs de stam"}]},
  { n:"Sierwilg", l:"Salix", h:"middel", cat:"boom", blad:"bladverliezend", s:"voorjaar", b:"feb–apr", c:"#c8d060", licht:"zon", d:"Volle zon, vochtige grond. Wilgen voor decoratieve schors, hangende groeiwijze of zilverige katjes. Snelgroeiend. Integra 'Hakuro Nishiki' is populairste tuin-wilg voor bontbladig effect.", cv:[{name:"caprea 'Kilmarnock'",kleur:"grijze katjes",hoogte:"2m",tip:"Treurkatjeswilg op stam — vaste bolvorm"},{name:"integra 'Hakuro Nishiki'",kleur:"roze-wit-groen bontblad",hoogte:"2m",tip:"Bontblad roze in voorjaar, groen-wit in zomer"},{name:"babylonica 'Tortuosa'",kleur:"geel herfst",hoogte:"10m",tip:"Gekrulde twijgen — sierwaarde jaarrond"},{name:"sepulcralis 'Chrysocoma'",kleur:"geel",hoogte:"15m",tip:"Klassieke treurwilg — langs water imposant"},{name:"helvetica",kleur:"zilver-groen",hoogte:"2m",tip:"Zilverige bladeren, compact struik"},{name:"chamaecyparis 'Mount Aso'",kleur:"groen-geel",hoogte:"1.5m",tip:"Dwergwilg met fijn blad, breed uitgroeiend"}]},
  { n:"Sneeuwklokjesboom", l:"Styrax japonica", h:"middel", cat:"boom", blad:"bladverliezend", s:"zomer", b:"jun–jul", c:"#f8f8f8", licht:"halfschaduw", d:"Halfschaduw, zure humeuze vochtige grond. Hangende witte klokjesbloemen langs de onderkant van de takken in juni. Elegant en verfijnd. Plant op beschutte standplaats.", cv:[{name:"japonica",kleur:"wit",hoogte:"8m",tip:"Elegante boom met hangende witte bloemen"},{name:"japonica 'Pink Chimes'",kleur:"roze",hoogte:"6m",tip:"Roze variant — zeldzaam en bijzonder"},{name:"japonica 'June Snow'",kleur:"wit gevuld",hoogte:"5m",tip:"Gevuldere witte bloem dan de soort"},{name:"japonica 'Big Cascade'",kleur:"wit",hoogte:"6m",tip:"Overvloedigst bloeiend, hangende bloemtrossen"}]},
  // BH-4: Extra bomen
  { n:"Trompetboom", l:"Catalpa bignonioides", h:"groot", cat:"boom", blad:"bladverliezend", s:"zomer", b:"jul–aug", c:"#f8f8ee", licht:"zon", d:"Volle zon, vochtige voedselrijke grond. Grote hartvormige bladeren en witte orchidee-achtige bloemen in juli. Lange peulen decoratief in de winter. Exotische uitstraling.", cv:[{name:"bignonioides",kleur:"wit met paars-geel",hoogte:"12m",tip:"Brede schermvormige kroon, exotische aanblik"},{name:"bignonioides 'Aurea'",kleur:"wit + geel blad",hoogte:"10m",tip:"Goudgeel blad — spectaculair in combinaties"},{name:"bignonioides 'Nana'",kleur:"wit",hoogte:"5m",tip:"Bolcatalpa op stam — compacte bolvorm"},{name:"erubescens 'Purpurea'",kleur:"wit + donkerpaars jong blad",hoogte:"12m",tip:"Donkerpaars blad bij uitlopen, later groen"}]},
  { n:"Esdoorn (overig)", l:"Acer", h:"middel", cat:"boom", blad:"bladverliezend", s:"herfst", b:"sep–okt", c:"#d06820", licht:"zon", d:"Zon tot halfschaduw, goed gedraineerde grond. Naast de Japanse esdoorn (palmatum) biedt Muijderman ook andere Acer-soorten: griseum met rode schors, shirasawanum met vroeg goudgeel blad en japonicum.", cv:[{name:"griseum",kleur:"oranje-rood schors + herfst",hoogte:"10m",tip:"Kaneelkleurige schors peelt af — uniek jaarrond"},{name:"japonicum 'Aconitifolium'",kleur:"scharlakenrood herfst",hoogte:"5m",tip:"Diepst ingesneden blad, spectaculaire herfst"},{name:"shirasawanum 'Aureum'",kleur:"goudgeel blad",hoogte:"5m",tip:"Goudgeel blad de hele zomer — bijzonder"},{name:"shirasawanum 'Autumn Moon'",kleur:"oranje-geel blad",hoogte:"4m",tip:"Oranje-geel blad in alle seizoenen"},{name:"pseudoplatanus 'Brilliantissimum'",kleur:"zalmoranje jonge blaadjes",hoogte:"6m",tip:"Zalmoranje blaadjes in het voorjaar — opvallend"},{name:"platanoides 'Globosum'",kleur:"geel herfst",hoogte:"5m",tip:"Bolesdoorn op stam, vaste bolvorm zonder snoei"},{name:"campestre",kleur:"geel herfst",hoogte:"12m",tip:"Veldesdoorn — inheems, haag- of solitairplant"},{name:"rubrum 'Somerset'",kleur:"felrood herfst",hoogte:"12m",tip:"Rode esdoorn — één van de kleurrijkste herfstbomen"}]},
  { n:"Gele kornoelje", l:"Cornus mas", h:"middel", cat:"boom", blad:"bladverliezend", s:"voorjaar", b:"feb–mrt", c:"#f0d020", licht:"zon", d:"Zon tot halfschaduw, vrijwel elke grond. Bloeit vroeg op kaal hout — kleine gele bloemetjes in februari. Rode kersen (kornoelje) eetbaar. Stevige haag- of solitaire plant. Minder bekend dan andere kornoeljes maar zeer betrouwbaar.", cv:[{name:"mas",kleur:"geel",hoogte:"5m",tip:"Vroeg geel op kaal hout — één van eerste bloeiende bomen"},{name:"mas 'Aurea'",kleur:"geel + goudgeel blad",hoogte:"4m",tip:"Bontbladig goudgeel — het hele seizoen sierlijk"},{name:"mas 'Jolico'",kleur:"geel + grote vruchten",hoogte:"4m",tip:"Grote kornoelje-vruchten, ook voor gelei/jam"}]},
  { n:"Iep", l:"Ulmus", h:"groot", cat:"boom", blad:"bladverliezend", s:"herfst", b:"aug–okt", c:"#88a040", licht:"zon", d:"Volle zon, diepe klei- of leemgrond. Klassieke Nederlandse bomenlaan-boom. Let op iepziekte (Ophiostoma). Rassen zoals 'Wredei' en resistente hybriden zijn bestendiger.", cv:[{name:"carpinifolia 'Wredei'",kleur:"goudgeel blad",hoogte:"15m",tip:"Goudiep — zuilvormig met geel blad"},{name:"glabra 'Camperdownii'",kleur:"geelbruin herfst",hoogte:"5m",tip:"Treureip op stam — ronde huilende kroon"}]},
  { n:"Zijdeboom", l:"Albizia julibrissin", h:"middel", cat:"boom", blad:"bladverliezend", s:"zomer", b:"jul–aug", c:"#f888b0", licht:"zon", d:"Volle zon, goed gedraineerde arme grond. Tropisch ogende veerbladen en pluizige roze bloemen in de zomer. Groeit naar boven en open. Vraagt beschutte warme standplaats — gevoelig voor vorst.", cv:[{name:"julibrissin",kleur:"roze",hoogte:"8m",tip:"Brede open kroon, tropisch effect"},{name:"'Ombrella'",kleur:"roze",hoogte:"5m",tip:"Paraplu-vorm op stam — compacte bolvorm"},{name:"'Summer Chocolate'",kleur:"roze + bruin-paars blad",hoogte:"6m",tip:"Donker blad met roze bloemen — sterk contrast"},{name:"'Rouge de Tuiliére'",kleur:"dieper roze",hoogte:"7m",tip:"Rijker bloeiend dan de soort"}]},
  // BH-5: Lentebloeiers struiken (1)
  { n:"Japanse kwee", l:"Chaenomeles", h:"klein", cat:"heester", blad:"bladverliezend", s:"voorjaar", b:"mrt–apr", c:"#ee4422", licht:"zon", d:"Volle zon, vrijwel elke grond. Één van de vroegste bloeiende struiken — felgekleurde bloemen op kaal hout in maart. Eetbare harde gele vruchten (kweepeer) in de herfst. Uitstekend als haag of leiboom.", cv:[{name:"speciosa 'Nivalis'",kleur:"wit",hoogte:"2m",tip:"Sierlijkste witte kwee, overvloedige bloei"},{name:"superba 'Pink Lady'",kleur:"roze",hoogte:"1.5m",tip:"Breed uitgroeiend, kleurrijke roze bloei"},{name:"superba 'Jet Trail'",kleur:"wit",hoogte:"0.8m",tip:"Laagste kwee, spreidt breed zonder haakjes"},{name:"superba 'Texas Scarlet'",kleur:"felrood",hoogte:"1m",tip:"Rijkst rood en laag — bodembedekker effect"},{name:"superba 'Red Trail'",kleur:"scharlaken rood",hoogte:"0.8m",tip:"Breed spreidend rood, geen doornen"},{name:"japonica 'Sargentii'",kleur:"oranjerood",hoogte:"1m",tip:"Compacte Japanse kwee, vroeg bloeiend"},{name:"speciosa 'Red Kimono'",kleur:"donkerrood",hoogte:"1.5m",tip:"Stijlvol donkerrood, halfdubbele bloemen"}]},
  { n:"Deutzia", l:"Deutzia", h:"klein", cat:"heester", blad:"bladverliezend", s:"voorjaar", b:"mei–jun", c:"#f8e8f8", licht:"zon", d:"Volle zon, vrijwel elke goed gedraineerde grond. Massale kleine bloemetjes in mei-juni. Snoei direct na de bloei — bloeit op tweejarig hout. Robuust en snel groeiend.", cv:[{name:"gracilis",kleur:"wit",hoogte:"1.2m",tip:"Sierlijkste kleine deutzia, fonteinsgewijs"},{name:"gracilis 'Nikko'",kleur:"wit",hoogte:"0.6m",tip:"Laagste deutzia — bodembedekker"},{name:"hybrida 'Mont Rose'",kleur:"roze",hoogte:"2m",tip:"Roze klokvormige bloemen, breed uitgroeiend"},{name:"hybr. 'Strawberry Fields'",kleur:"roze-rood",hoogte:"2m",tip:"Rijke roze bloei, aantrekkelijk voor insecten"},{name:"kalmiiflora",kleur:"wit-roze",hoogte:"1.5m",tip:"Kelkvormige roze bloemen, elegant"},{name:"rosea 'Campanulata'",kleur:"wit met paarse blos",hoogte:"1.2m",tip:"Bicolor — witroze kelkbladen"},{name:"scabra 'Plena'",kleur:"wit gevuld",hoogte:"2.5m",tip:"Gevuld wit — langste bloeiseizoen bij deutzia"}]},
  { n:"Boerenjasmijn", l:"Philadelphus", h:"middel", cat:"heester", blad:"bladverliezend", s:"zomer", b:"jun–jul", c:"#f8f8f0", licht:"zon", d:"Volle zon tot halfschaduw, vrijwel elke grond. Overrompelend geurende witte bloemen in juni-juli. Snoei na de bloei de oudste takken tot de grond. Robuust en snel groeiend.", cv:[{name:"coronarius",kleur:"crèmewit sterk geurend",hoogte:"3m",tip:"Sterkst geurende philadelphus"},{name:"'Virginal'",kleur:"wit gevuld",hoogte:"3m",tip:"Klassiek gevuld, sterk geurend"},{name:"'Belle Etoile'",kleur:"wit + paars hart",hoogte:"2m",tip:"Bicolor — wit met paars hart, sterk geurend"},{name:"'Manteau d'Hermine'",kleur:"wit gevuld",hoogte:"1.2m",tip:"Compactste dubbele boerenjasmijn"},{name:"'Lemoinei'",kleur:"wit",hoogte:"2m",tip:"Compact en rijkbloeiend"},{name:"'Dame Blanche'",kleur:"wit gevuld",hoogte:"1m",tip:"Laagste cultivar, semi-gevuld"}]},
  { n:"Parelstruik", l:"Exochorda macrantha", h:"klein", cat:"heester", blad:"bladverliezend", s:"voorjaar", b:"apr–mei", c:"#f8f8f8", licht:"zon", d:"Volle zon, goed gedraineerde humeuze grond. Knoppen lijken op pareltjes vóór de bloei. Explosie van zuiverwitte bloemen in april-mei. Eénmalige bloei op oud hout — na bloei licht snoeien.", cv:[{name:"macrantha 'The Bride'",kleur:"zuiverwit",hoogte:"2m",tip:"Overhangende takken vol witte bloemen — indrukwekkend"}]},
  { n:"Schoonheidsstruik", l:"Kolkwitzia amabilis", h:"middel", cat:"heester", blad:"bladverliezend", s:"voorjaar", b:"mei–jun", c:"#f8c0d0", licht:"zon", d:"Volle zon, goed gedraineerde grond. Fonteinsgewijze struik bedekt met roze klokvormige bloemen in mei-juni. Snoeiarm en robuust. Weinig bekend maar uitzonderlijk mooi.", cv:[{name:"amabilis 'Pink Cloud'",kleur:"roze met geel hart",hoogte:"3m",tip:"Rijkst bloeiende cultivar — overrompelend in volle bloei"}]},
  // BH-6: Lentebloeiers struiken (2)
  { n:"Zuurbes", l:"Berberis thunbergii", h:"klein", cat:"heester", blad:"bladverliezend", s:"herfst", b:"apr + sep–okt", c:"#cc3300", licht:"zon", d:"Volle zon, vrijwel elke grond. Gele bloempjes in april, rode bessen in de herfst. Doornige struik — uitstekende ondoordringbare haag. Cultivars met paars blad zijn jaar rond decoratief.", cv:[{name:"thunbergii 'Atropurpurea'",kleur:"geel bloem + paars blad",hoogte:"1.5m",tip:"Klassiek paarsblad-berberis, robuust"},{name:"thunbergii 'Atropurpurea Nana'",kleur:"geel bloem + paars blad",hoogte:"0.6m",tip:"Compact dwergvorm — ideaal als lage haag"},{name:"thunbergii 'Rose Glow'",kleur:"roze-wit bont blad",hoogte:"1.5m",tip:"Bontbladig: rood-roze met witte vlekken"},{name:"thunbergii 'Orange Ice'",kleur:"geel + oranje blad",hoogte:"1m",tip:"Oranje-geel blad in zomer, rood in herfst"},{name:"thunbergii 'Powwow'",kleur:"geel + groen blad",hoogte:"0.8m",tip:"Heldergroen blad, compacte bolvorm"},{name:"media 'Parkjuweel'",kleur:"geel + semi-groenblijvend",hoogte:"1.5m",tip:"Semi-groenblijvend, geschikte heesterhaag"},{name:"julianae",kleur:"geel + donkergroen",hoogte:"2m",tip:"Groenblijvende soort — stevige doornige haag"}]},
  { n:"Gele mantel", l:"Kerria japonica", h:"klein", cat:"heester", blad:"bladverliezend", s:"voorjaar", b:"apr–mei", c:"#f0c020", licht:"halfschaduw", d:"Halfschaduw, vrijwel elke grond. Felgele boterbloem-achtige bloemen in april-mei. Groene twijgen sierlijk in de winter. Uitlopen via wortelscheuten — inperken in kleine tuin.", cv:[{name:"japonica",kleur:"geel enkelvoudig",hoogte:"2m",tip:"Eenvoudige gele bloem, ook in schaduw"},{name:"japonica 'Pleniflora'",kleur:"geel gevuld",hoogte:"2.5m",tip:"Pompoen-achtige gevulde bloemen — rijkst bloeiend"}]},
  { n:"Brem", l:"Cytisus praecox", h:"klein", cat:"heester", blad:"bladverliezend", s:"voorjaar", b:"apr–mei", c:"#f0d820", licht:"zon", d:"Volle zon, arme droge goed gedraineerde grond. Elegante boogvormige struik overstrooid met kleine vlinderbloempjes. Droogtetolerant, groeit ook op arm zand. Snoei na bloei voor compactheid.", cv:[{name:"praecox",kleur:"crèmegeel",hoogte:"1.5m",tip:"Vroegst bloeiende brem, elegante boogvorm"},{name:"praecox 'Albus'",kleur:"wit",hoogte:"1.5m",tip:"Witte brem — fris en luchtig"},{name:"praecox 'Allgold'",kleur:"goudgeel",hoogte:"1.5m",tip:"Rijkst geel bloeiend"},{name:"scoparius",kleur:"geel",hoogte:"2m",tip:"Wilde brem — meest robuust en snelgroeiend"},{name:"'Boskoop Ruby'",kleur:"rood-geel bicolor",hoogte:"1.5m",tip:"Tweekleurige rode brem — opvallend"},{name:"(P) 'Zeelandia'",kleur:"roze-crème",hoogte:"1.5m",tip:"Zalmroze hybride — zachte pastelkleur"}]},
  { n:"Pijlkruid", l:"Daphne", h:"klein", cat:"heester", blad:"groenblijvend", s:"winter", b:"feb–apr", c:"#f8c8e8", licht:"halfschaduw", d:"Halfschaduw, goed gedraineerde humeuze kalkrijke grond. Intens geurende bloemen in late winter/vroeg voorjaar. Giftige rode bessen in de zomer. Plant niet verplaatsen — gevoelig voor verstoring.", cv:[{name:"cneorum",kleur:"roze",hoogte:"0.3m",tip:"Kruipend, geurend — voor rotstuin of rand"},{name:"tangutica",kleur:"wit-roze",hoogte:"1m",tip:"Groenblijvend, bloeit ook in herfst na"},{name:"odora 'Perfum Princess'",kleur:"roze-wit",hoogte:"1m",tip:"Sterkst geurende daphne — bijzonder"}]},
  { n:"Winterhazelaar", l:"Corylopsis", h:"middel", cat:"heester", blad:"bladverliezend", s:"voorjaar", b:"mrt–apr", c:"#f0e020", licht:"halfschaduw", d:"Halfschaduw, zure humeuze grond. Geurende hangende gele bloempjes vóór het blad in maart. Minder gevoelig voor vorstschade dan hamamelis. Elegante structuur.", cv:[{name:"glabrescens",kleur:"bleekgeel",hoogte:"3m",tip:"Vroegst en meest robuust"},{name:"pauciflora",kleur:"lichtgeel",hoogte:"1.5m",tip:"Compact, geschikt voor kleine tuin"},{name:"spicata",kleur:"geel",hoogte:"2m",tip:"Rijke bloemtrossen, breed uitgroeiend"}]},
  // BH-7: Zomerbloeiers
  { n:"Tuinhibiscus", l:"Hibiscus syriacus", h:"klein", cat:"heester", blad:"bladverliezend", s:"zomer", b:"jul–sep", c:"#9966cc", licht:"zon", d:"Volle zon, goed gedraineerde humeuze grond. Bloeit laat in de zomer als de meeste struiken al uitgebloeid zijn. Grote bloemen, lange bloeiseizoen. Beschutte standplaats — uitlopers laat in het voorjaar.", cv:[{name:"'Oiseau Bleu'",kleur:"blauw-paars + donker oog",hoogte:"2.5m",tip:"Populairste blauwe hibiscus"},{name:"'Marina'",kleur:"lila-blauw",hoogte:"2m",tip:"Rijkbloeiend blauw, compact"},{name:"'Red Heart'",kleur:"wit + donkerrood oog",hoogte:"2.5m",tip:"Sterkste bicolor — stralend contrast"},{name:"'Hamabo'",kleur:"roze + rood oog",hoogte:"2m",tip:"Lichte roze met rood hart — elegant"},{name:"'Pink Chiffon'",kleur:"roze gevuld",hoogte:"2m",tip:"Gevuld roze — bijzondere textuur"},{name:"'Totus Albus'",kleur:"wit",hoogte:"2m",tip:"Zuiverwit, strak"},{name:"'Speciosus'",kleur:"wit gevuld + rood hart",hoogte:"2.5m",tip:"Gevuld wit met rode ader"}]},
  { n:"Struikganzerik", l:"Potentilla fruticosa", h:"klein", cat:"heester", blad:"bladverliezend", s:"zomer", b:"jun–okt", c:"#f0c820", licht:"zon", d:"Volle zon, vrijwel elke goed gedraineerde grond. Bloeit zonder onderbreking van juni tot in oktober. Droogtetolerant en robuust. Ideaal voor lage border of lage haag.", cv:[{name:"'Abbotswood'",kleur:"wit",hoogte:"1m",tip:"Langst bloeiend wit, meest geteeld"},{name:"'Goldfinger'",kleur:"goudgeel",hoogte:"1m",tip:"Rijkst geel bloeiend cultivar"},{name:"'Primrose Beauty'",kleur:"lichtgeel",hoogte:"1m",tip:"Zachte pastelgele bloem"},{name:"'Pink Beauty'",kleur:"roze",hoogte:"0.8m",tip:"Roze ganzerik — kleur houdt goed"},{name:"'Red Ace'",kleur:"oranje-rood",hoogte:"0.8m",tip:"Oranje-rood vervaagt in hitte tot geel"},{name:"'Kobold'",kleur:"geel",hoogte:"0.6m",tip:"Laagste cultivar — decoratieve rand"}]},
  { n:"Hertshooi", l:"Hypericum", h:"klein", cat:"heester", blad:"bladverliezend", s:"zomer", b:"jun–sep", c:"#f0d020", licht:"zon", d:"Zon tot halfschaduw, vrijwel elke grond. Gele bloemhoofdjes de hele zomer. Calycinum = groenblijvende bodembedekker. 'Hidcote' is meest geteelde halfhoge struik.", cv:[{name:"calycinum",kleur:"geel",hoogte:"0.3m",tip:"Groenblijvende bodembedekker — ook in schaduw"},{name:"'Hidcote'",kleur:"geel",hoogte:"1.2m",tip:"Meest betrouwbare bloeier, halfgroenblijvend"},{name:"inodorum 'Rheingold'",kleur:"geel + goudgele bessen",hoogte:"1m",tip:"Sierbessen goudgeel na de bloei"},{name:"mirabile 'Attraction'",kleur:"geel + rode bessen",hoogte:"1m",tip:"Rode sierbessen na gele bloei — tweemaal sierwaarde"},{name:"mirabile 'Blizz'",kleur:"geel + rode bessen",hoogte:"1m",tip:"Rijkst rodebessen-producerend"}]},
  { n:"Blaasjesspiraea", l:"Physocarpus opulifolius", h:"klein", cat:"heester", blad:"bladverliezend", s:"zomer", b:"jun–jul", c:"#884422", licht:"zon", d:"Volle zon, vrijwel elke grond. Witte of roze bloempjes in juni. Bladkleur-variëteiten zijn het hele seizoen decoratief. Droogtetolerant en robuust.", cv:[{name:"'Diabolo'",kleur:"wit + bijna zwart-paars blad",hoogte:"2.5m",tip:"Diepste paarse blad — sterk contrast met wit"},{name:"'Lady in Red'",kleur:"roze + donkerrood blad",hoogte:"2m",tip:"Roodbruine bladeren, roze bloem"},{name:"'Little Devil'",kleur:"wit + paars blad",hoogte:"1.2m",tip:"Compact paarsblad"},{name:"'Amber Jubilee'",kleur:"wit + oranje-geel blad",hoogte:"2m",tip:"Uniek: blad wisselt oranje-geel-rood door het seizoen"},{name:"'Dart's Gold'",kleur:"wit + goudgeel blad",hoogte:"1.5m",tip:"Goudgeel blad, lichte struik"},{name:"'Little Joker'",kleur:"wit + paars blad",hoogte:"1m",tip:"Compact paarsblad, rijkbloeiend"},{name:"'Tiny Wine'",kleur:"roze + wijnrood blad",hoogte:"1m",tip:"Kleinste wijnrode physocarpus"}]},
  { n:"Blauwe spirea", l:"Caryopteris clandonensis", h:"klein", cat:"heester", blad:"bladverliezend", s:"herfst", b:"aug–okt", c:"#5566cc", licht:"zon", d:"Volle zon, goed gedraineerde arme grond. Lavendelblauw bloeiend in augustus-september. Aromatisch blad. Terugsnoeien in het voorjaar tot een paar cm boven de grond. Droogtetolerant.", cv:[{name:"'Heavenly Blue'",kleur:"hemelblauw",hoogte:"0.8m",tip:"Meest geteeld, betrouwbaar blauw"},{name:"'Grand Blue'",kleur:"diepblauw",hoogte:"0.8m",tip:"Diepste blauwtint bij caryopteris"},{name:"'Kew Blue'",kleur:"donkerblauw",hoogte:"0.8m",tip:"Compact, donker blauw"},{name:"'Sterling Silver'",kleur:"blauw + zilver blad",hoogte:"0.8m",tip:"Zilverachtig blad — extra sierwaarde"},{name:"'Stephi'",kleur:"blauw",hoogte:"0.8m",tip:"Geel bontbladig met blauwe bloem"}]},
  // BH-8: Herfst/bessen heesters
  { n:"Dwergmispel", l:"Cotoneaster", h:"klein", cat:"heester", blad:"groenblijvend", s:"herfst", b:"sep–dec", c:"#ee2200", licht:"zon", d:"Volle zon tot halfschaduw, vrijwel elke grond. Witte of roze bloempjes in mei gevolgd door rijke rode of oranje bessen in de herfst. Populair bij vogels. Laagblijvende soorten als bodembedekker.", cv:[{name:"dammeri",kleur:"rode bessen",hoogte:"0.3m",tip:"Groenblijvende bodembedekker — vlak uitgroeiend"},{name:"'Coral Beauty'",kleur:"oranje-rode bessen",hoogte:"0.8m",tip:"Rijkste bessenproductie bij laagblijvende soorten"},{name:"horizontalis",kleur:"rode bessen",hoogte:"0.8m",tip:"Visgraatpatroon — decoratieve muurplant"},{name:"'Eichholz'",kleur:"rode bessen",hoogte:"0.5m",tip:"Compact bodembedekker, veel bessen"},{name:"'Streib's Findling'",kleur:"rode bessen",hoogte:"0.3m",tip:"Zeer laag kruipend — dicht tapijt"},{name:"franchetii",kleur:"oranje-rode bessen",hoogte:"3m",tip:"Halfgroenblijvend, grote struik met veel bessen"},{name:"lacteus",kleur:"rode bessen",hoogte:"4m",tip:"Groenblijvend, grote rode bessenclusters laat in winter"}]},
  { n:"Vuurdoorn", l:"Pyracantha", h:"klein", cat:"heester", blad:"groenblijvend", s:"herfst", b:"sep–dec", c:"#ff4400", licht:"zon", d:"Volle zon, vrijwel elke goed gedraineerde grond. Witte bloesem in mei, spectaculaire bessen in herfst en winter. Doornig — uitstekende inbraakveilige haag. Ook als leiboom.", cv:[{name:"coccinea 'Saphyr Rouge'",kleur:"rood",hoogte:"2.5m",tip:"Meest rood, bestendig tegen schurft"},{name:"coccinea 'Saphyr Orange'",kleur:"oranje",hoogte:"2.5m",tip:"Oranje bessen, schurftbestendig"},{name:"coccinea 'Saphir Jaune'",kleur:"geel",hoogte:"2.5m",tip:"Gele bessen — zeldzamer"},{name:"'Orange Glow'",kleur:"oranje",hoogte:"3m",tip:"Meest geteelde, robuust oranje"},{name:"'Soleil d'Or'",kleur:"geel",hoogte:"3m",tip:"Zachte goudgele bessen"},{name:"coccinea 'Red Column'",kleur:"rood",hoogte:"3m",tip:"Opgerichte zuilvorm, felrood"}]},
  { n:"Pruikenboom", l:"Cotinus coggygria", h:"middel", cat:"heester", blad:"bladverliezend", s:"zomer", b:"jun–aug", c:"#774488", licht:"zon", d:"Volle zon, goed gedraineerde arme grond. Pluimachtige bloemsluiers (pruikeffect) in juni-augustus. Paarse bladcultivars zijn jaarrond decoratief. Prachtige herfstkleur.", cv:[{name:"'Royal Purple'",kleur:"paars blad + roze-paarse pruik",hoogte:"4m",tip:"Rijkste paarse blad — herfstkleur oranje-rood"},{name:"'Grace'",kleur:"rood blad + roze pruik",hoogte:"5m",tip:"Grootste blad en beste herfstkleur"},{name:"'Golden Spirit'",kleur:"goudgeel blad + roze pruik",hoogte:"3m",tip:"Goudgeel blad de hele zomer — bijzonder"},{name:"'Young Lady'",kleur:"groen blad + roze pruik",hoogte:"2m",tip:"Compactst en vroegst bloeiend"}]},
  { n:"Schoonvrucht", l:"Callicarpa bodinieri", h:"klein", cat:"heester", blad:"bladverliezend", s:"herfst", b:"sep–nov", c:"#aa44cc", licht:"zon", d:"Volle zon, goed gedraineerde grond. Opvallende paarse bessen dicht opeen langs de takken in de herfst. Plant meerdere exemplaren bij elkaar voor goede bestuiving.", cv:[{name:"bodinieri 'Profusion'",kleur:"violet-paarse bessen",hoogte:"2m",tip:"Rijkste bessenproductie — paars tapijt langs de twijgen"}]},
  { n:"Kardinaalsmuts", l:"Euonymus", h:"klein", cat:"heester", blad:"bladverliezend", s:"herfst", b:"okt–nov", c:"#ee4488", licht:"halfschaduw", d:"Halfschaduw tot zon, vrijwel elke grond. Euonymus alatus heeft spectaculaire roze-rode herfstkleur en kurkachtige vleugels. Euonymus europaeus met roze vruchtdozen. Fortuenii = groenblijvende klimmer of bodembedekker.", cv:[{name:"alatus 'Compactus'",kleur:"felrood herfstblad",hoogte:"1.5m",tip:"Beste herfstkleur van alle heesters — kompact"},{name:"alatus",kleur:"felrood herfstblad",hoogte:"2.5m",tip:"Kurkachtige vleugels sierlijk in de winter"},{name:"europaeus 'Red Cascade'",kleur:"roze vruchtdozen + rode bessen",hoogte:"3m",tip:"Roze vruchtdozen openen naar rode bessen"},{name:"europaeus",kleur:"roze vruchtdozen",hoogte:"4m",tip:"Inheems, vogelrijke solitair of haag"},{name:"fort. 'Emerald Gaiety'",kleur:"groen-wit bontblad",hoogte:"0.5m",tip:"Groenblijvend bodembedekker of klimmer"},{name:"fort. 'Emerald 'n Gold'",kleur:"groen-geel bontblad",hoogte:"0.5m",tip:"Goudgeel bontblad, groenblijvend"},{name:"fort. 'Harlequin'",kleur:"groen-wit gevlekt",hoogte:"0.4m",tip:"Witgevlekt, compact bodembedekker"},{name:"fort. 'Dart's Blanket'",kleur:"donkergroen",hoogte:"0.4m",tip:"Groenblijvend bodembedekker, robuust"}]},
  // BH-9: Groenblijvend (1)
  { n:"Mahonia", l:"Mahonia media", h:"middel", cat:"heester", blad:"groenblijvend", s:"winter", b:"nov–feb", c:"#f0d020", licht:"schaduw", d:"Halfschaduw tot schaduw, humeuze goed vochthoudende grond. Stekelig geveerd blad, geurende gele bloempluimen in november-februari. Blauw-zwarte bessen in de lente. Ideaal voor droge schaduwhoeken.", cv:[{name:"media 'Charity'",kleur:"geel geurend",hoogte:"3m",tip:"Meest imposante, lange rechtopstaande trossen"},{name:"media 'Winter Sun'",kleur:"geel geurend",hoogte:"2m",tip:"Compact en rijkbloeiend"},{name:"eureka 'Soft Caress'",kleur:"geel",hoogte:"1m",tip:"Zacht blad zonder stekels — uniek in het genus"},{name:"nitens 'Cabaret'",kleur:"geel",hoogte:"0.8m",tip:"Compact laag, fijn stekelig blad"}]},
  { n:"Hulst", l:"Ilex aquifolium", h:"middel", cat:"heester", blad:"groenblijvend", s:"herfst", b:"nov–jan", c:"#cc2200", licht:"halfschaduw", d:"Halfschaduw tot zon, goed gedraineerde humeuze grond. Stekelig glanzend blad en rode bessen (vrouwelijke planten). Plant man en vrouw bij elkaar voor bessen. Uitstekende onneembare haag. Crenata = bladloze haagsoort.", cv:[{name:"aquifolium",kleur:"rode bessen",hoogte:"10m",tip:"Inheemse hulst — vrouwelijk voor bessen"},{name:"aquifolium 'J.C. van Tol'",kleur:"rode bessen",hoogte:"6m",tip:"Zelfbestuivend — bessen zonder mannetje"},{name:"aquifolium 'Alaska'",kleur:"rode bessen",hoogte:"5m",tip:"Compact vrouwtje, vorstbestendig"},{name:"aquifolium 'Argenteomarginata'",kleur:"rode bessen + wit rand",hoogte:"6m",tip:"Witbonte bladrand, vrouwelijk"},{name:"aquifolium 'Ferox Argentea'",kleur:"zilverrand",hoogte:"4m",tip:"Stekelig zilverrand — mannelijk, voor bestuiving"},{name:"altaclarensis 'Golden King'",kleur:"gele rand + rode bessen",hoogte:"6m",tip:"Goudrand — is ondanks naam vrouwelijk"},{name:"crenata 'Convexa'",kleur:"kleine zwarte bessen",hoogte:"1.5m",tip:"Buxusvervanger — groenblijvende haag zonder stekels"},{name:"crenata 'Caroline Upright'",kleur:"kleine zwarte bessen",hoogte:"3m",tip:"Oprecht zuilvormig buxusvervanger"}]},
  { n:"Liguster", l:"Ligustrum ovalifolium", h:"middel", cat:"heester", blad:"groenblijvend", s:"zomer", b:"jun–jul", c:"#f8f8e8", licht:"zon", d:"Zon tot halfschaduw, vrijwel elke grond. Dé klassieke haagstruik. Geurende witte bloemtrossen in juni. Snelgroeiend en goed te snoeien. Semi-groenblijvend of groenblijvend afhankelijk van winter.", cv:[{name:"ovalifolium",kleur:"wit geurend",hoogte:"4m",tip:"Gewone liguster — snel en goedkoop als haag"},{name:"ovalifolium 'Aureum'",kleur:"wit + geel-groen bontblad",hoogte:"3m",tip:"Goudliguster — geel-groen blad jaarrond"},{name:"japonicum 'Texanum'",kleur:"wit",hoogte:"2m",tip:"Compacte Japanse liguster, groenblijvend"},{name:"japonicum 'Columbine'",kleur:"wit",hoogte:"2m",tip:"Groenblijvend, geschikt als solitair of haag"},{name:"lucidum",kleur:"wit",hoogte:"6m",tip:"Boomliguster, groenblijvend, grote bloemtrossen"},{name:"vulgare 'Lodense'",kleur:"wit",hoogte:"1.5m",tip:"Laagblijvende liguster voor lage haag"},{name:"quihoui",kleur:"wit",hoogte:"2m",tip:"Laat bloeiend, lang bloeiend cultivar"},{name:"delavayanum",kleur:"wit",hoogte:"1.5m",tip:"Sierlijk fijnbladig — halfgroenblijvend"}]},
  { n:"Osmanthus", l:"Osmanthus burkwoodii", h:"middel", cat:"heester", blad:"groenblijvend", s:"voorjaar", b:"apr–mei", c:"#f0f0e8", licht:"halfschaduw", d:"Halfschaduw, goed gedraineerde grond. Geurende witte bloempjes in april-mei. Donkergroen stekelig blad lijkt op hulst. Uitstekende buxusvervanger voor haag of solitair. Langzame groeier.", cv:[{name:"burkwoodii",kleur:"wit geurend",hoogte:"3m",tip:"Meest populair, compact en betrouwbaar"},{name:"delavayi",kleur:"wit geurend",hoogte:"3m",tip:"Fijner blad dan burkwoodii, iets groter"},{name:"heterophyllus",kleur:"wit",hoogte:"3m",tip:"Stekelig blad zoals hulst — als haag"},{name:"heterophyllus 'Goshiki'",kleur:"wit + bontblad",hoogte:"2m",tip:"Groen-geel-roze bontblad — uitbundig"},{name:"heterophyllus 'Variegatus'",kleur:"wit + wit rand",hoogte:"2m",tip:"Witbonte bladrand, sierlijk"}]},
  { n:"Olijfwilg", l:"Elaeagnus", h:"middel", cat:"heester", blad:"groenblijvend", s:"herfst", b:"okt–nov", c:"#c8b870", licht:"zon", d:"Volle zon, goed gedraineerde grond. Geurende kleine bloempjes in oktober onopvallend maar intens geurend. Zilveren of bontbladige cultivars sierlijk jaarrond. Wind- en zoutbestendig.", cv:[{name:"ebbingei",kleur:"zilver onderblad",hoogte:"4m",tip:"Snelste groenblijvende windscherm"},{name:"ebbingei 'Compacta'",kleur:"zilver onderblad",hoogte:"2m",tip:"Compacte vorm van ebbingei"},{name:"ebbingei 'Limelight'",kleur:"geel-groen bontblad",hoogte:"2.5m",tip:"Gele vlekken in het blad — sierlijk"},{name:"pungens 'Maculata'",kleur:"goud-geel bontblad",hoogte:"2.5m",tip:"Goudgeel gevlekte bladeren, langzamer"},{name:"multiflora",kleur:"oranje-rode bessen",hoogte:"3m",tip:"Bladverliezend — eetbare rode bessen in zomer"},{name:"umbellata",kleur:"zilverachtig + rode bessen",hoogte:"4m",tip:"Inheems in Azië, drukte bloesem, rode bessen"}]},
  // BH-10: Groenblijvend (2) — zure grond
  { n:"Rododendron / Azalea", l:"Rhododendron", h:"klein", cat:"heester", blad:"groenblijvend", s:"voorjaar", b:"apr–jun", c:"#dd4466", licht:"halfschaduw", d:"Halfschaduw, zure humeuze goed vochthoudende grond. Prachtige bloemhoofdjes in voorjaar. Nooit op kalk. Azalea's zijn ook rhododendrons (bladverliezend). Bijmesten met rododendron-meststof.", cv:[{name:"(T) 'Alb. Schweitzer'",kleur:"roze",hoogte:"3m",tip:"Roze treehybride, klassiek en robuust"},{name:"(T) 'Catawbiense Boursault'",kleur:"lila",hoogte:"3m",tip:"Hardste cultivar, verdraagt wind en kou"},{name:"(T) 'Catawbiense Grandiflorum'",kleur:"lila-paars",hoogte:"3m",tip:"Grote bloemhoofdjes, robuust"},{name:"'Azurika'",kleur:"lila-blauw",hoogte:"0.8m",tip:"Compact en blauw — zeldzame kleur"},{name:"(R) 'Baden-Baden'",kleur:"felrood",hoogte:"0.8m",tip:"Compact lage repens-hybride"},{name:"(AJ) 'Amoena'",kleur:"paars-roze",hoogte:"1m",tip:"Japanse azalea, semi-groenblijvend"},{name:"(AJ) 'Silvester'",kleur:"wit",hoogte:"1m",tip:"Witte japanse azalea, laat bloeiend"},{name:"'Chanel'",kleur:"zalm-oranje",hoogte:"2m",tip:"Unieke zalmkleur"}]},
  { n:"Bergthee / Pieris", l:"Pieris japonica", h:"klein", cat:"heester", blad:"groenblijvend", s:"voorjaar", b:"mrt–apr", c:"#f8e8e0", licht:"halfschaduw", d:"Halfschaduw, zure humeuze grond. Hangende witte bloemtrosjes in maart-april. Jonge blaadjes opvallend rood of roze. Giftig voor vee. Groeit langzaam — geduld vereist.", cv:[{name:"'Forest Flame'",kleur:"wit + felrood jong blad",hoogte:"3m",tip:"Opvallendste rode uitloop van alle pieris"},{name:"'Mountain Fire'",kleur:"wit + felrood jong blad",hoogte:"2m",tip:"Roder dan 'Forest Flame', compact"},{name:"'Passion'",kleur:"roze + rood jong blad",hoogte:"1.5m",tip:"Roze bloemen, ook decoratief jong blad"},{name:"'Pink Passion'",kleur:"roze",hoogte:"1.2m",tip:"Dieper roze dan 'Passion'"},{name:"'Little Heath'",kleur:"wit + bontblad",hoogte:"0.8m",tip:"Dwergvorm met bontblad"}]},
  { n:"Skimmia", l:"Skimmia japonica", h:"klein", cat:"heester", blad:"groenblijvend", s:"voorjaar", b:"apr–mei", c:"#cc3322", licht:"schaduw", d:"Schaduw tot halfschaduw, zure humeuze grond. Rode knoppen sieren de plant de hele winter. Witte geurende bloemen in april-mei. Plant man (Rubella) en vrouw bij elkaar voor bessen.", cv:[{name:"'Rubella'",kleur:"rode knoppen → wit",hoogte:"1.2m",tip:"Mannelijk — rode knoppen de hele winter, sterk geurend"},{name:"'Temptation'",kleur:"rode bessen",hoogte:"1m",tip:"Vrouwelijk, zelfbestuivend — bessen zonder man"},{name:"'Finchy'",kleur:"rode bessen",hoogte:"1m",tip:"Vrouwelijk, compact"},{name:"'Marlot'",kleur:"rode bessen",hoogte:"1.2m",tip:"Vrouwelijk, grote bessen"},{name:"'Mystic Marlot'",kleur:"roze bloemen + bontblad",hoogte:"1m",tip:"Bontblad crème-groen, roze bloemen"},{name:"confusa 'Kew Green'",kleur:"groen knoppen → wit",hoogte:"1.2m",tip:"Groene knoppen, sterkst geurend van alle skimmia"},{name:"'White Bella'",kleur:"wit",hoogte:"1m",tip:"Wit bloeiend, compact"}]},
  { n:"Mexicaanse sinaasappel", l:"Choisya ternata", h:"klein", cat:"heester", blad:"groenblijvend", s:"voorjaar", b:"apr–mei + aug", c:"#f8f8e0", licht:"zon", d:"Volle zon, goed gedraineerde grond. Geurende witte bloemen in mei, nabloei in augustus. Glansbladig, geurend bij aanraken. Beschutte standplaats — bij zware vorst kan blad bevriezen.", cv:[{name:"ternata",kleur:"wit geurend",hoogte:"2m",tip:"Klassiek, rijkbloeiend en geurend"},{name:"ternata 'Lich'",kleur:"wit + geel blad",hoogte:"1.5m",tip:"Goudgeel blad met witte bloem — bijzonder"},{name:"'Aztec Pearl'",kleur:"wit-roze",hoogte:"2m",tip:"Smal blad, roze knoppen openen wit"},{name:"'Aztek Gold'",kleur:"wit + goudgeel blad",hoogte:"1.5m",tip:"Fel goudgeel blad jaarrond"},{name:"ternata 'White Dazzler'",kleur:"wit gevuld",hoogte:"1.5m",tip:"Gevuldere witte bloem, lang bloeiend"}]},
  { n:"Aucuba", l:"Aucuba japonica", h:"klein", cat:"heester", blad:"groenblijvend", s:"herfst", b:"mrt + nov–dec", c:"#446622", licht:"schaduw", d:"Schaduw, vrijwel elke grond. Uitstekende plant voor diepe schaduw. Grote glanzende bladeren. Vrouwelijke planten geven rode bessen. Plantman en vrouw samen voor bessen.", cv:[{name:"'Rozannie'",kleur:"groene bloem + rode bessen",hoogte:"1.5m",tip:"Zelfbestuivend — bessen zonder man, zeldzaam"},{name:"'Variegata'",kleur:"geel gespikkeld blad",hoogte:"2m",tip:"Goudgespikkeld — sierlijkste aucuba, ook in diepe schaduw"}]},
  // BH-11: Herfst/streek heesters
  { n:"Kornoelje (struik)", l:"Cornus alba", h:"klein", cat:"heester", blad:"bladverliezend", s:"herfst", b:"okt–jan", c:"#cc2222", licht:"zon", d:"Volle zon tot halfschaduw, natte tot droge grond. Gekleurde twijgen sieren de struik in de winter — rood, geel of groen afhankelijk van de cultivar. Na de winter terugsnoeien voor de beste twijgkleur.", cv:[{name:"alba 'Sibirica'",kleur:"helderrode twijgen",hoogte:"2m",tip:"Schitterendste rode twijgen in de winter"},{name:"alba 'Elegantissima'",kleur:"rode twijgen + wit-groen blad",hoogte:"2m",tip:"Bontbladig met rode twijgen — dubbelzijdige sierwaarde"},{name:"sanguinea",kleur:"donkerrode twijgen",hoogte:"2m",tip:"Inheemse soort, ook als grote struik"},{name:"sanguinea 'Midwinter Fire'",kleur:"geel-oranje-rood twijgen",hoogte:"1.5m",tip:"Vuurkleur gradient van geel naar rood — spectaculair"},{name:"stolonifera 'Flaviramea'",kleur:"geel-groene twijgen",hoogte:"2m",tip:"Gele twijgen als tegenhanger voor rode soorten"},{name:"stolonifera 'Kelsey's Dwarf'",kleur:"rode twijgen",hoogte:"0.6m",tip:"Laagste rode twijgenkornolje"}]},
  { n:"Pluimspiraea", l:"Sorbaria sorbifolia", h:"middel", cat:"heester", blad:"bladverliezend", s:"zomer", b:"jul–aug", c:"#f8f8f8", licht:"zon", d:"Zon tot halfschaduw, vochtige grond. Grote sierlijke geveerde bladeren. Witte pluimvormige bloemen in de zomer. Groeit snel uit en breidt uit via wortelscheuten — bij kleine tuin inperken.", cv:[{name:"sorbifolia 'Sem'",kleur:"wit + oranje-rood jong blad",hoogte:"1.2m",tip:"Compact, prachtig gekleurd jong blad in voorjaar"}]},
  { n:"Kransstruik", l:"Stephanandra incisa", h:"klein", cat:"heester", blad:"bladverliezend", s:"zomer", b:"jun–jul", c:"#f8f0e0", licht:"halfschaduw", d:"Halfschaduw, goed vochthoudende grond. Sierlijk ingesneden blad. Witte kleine bloempjes. Mooi als bodembedekker of overloopstruik op helling. Goede herfstkleur.", cv:[{name:"incisa 'Crispa'",kleur:"wit + oranje herfst",hoogte:"0.6m",tip:"Ideale helling-bedekker, krullend fijn blad"}]},
  { n:"Duindoorn", l:"Hippophae rhamnoides", h:"middel", cat:"heester", blad:"bladverliezend", s:"herfst", b:"sep–nov", c:"#f0a020", licht:"zon", d:"Volle zon, droge tot matig vochtige grond. Doornige struik met zilverachtig blad. Oranje-gele bessen dicht op de takken in de herfst — vogelmagnet en vitamine C-bom. Plant man en vrouw samen.", cv:[{name:"rhamnoides",kleur:"oranje-gele bessen",hoogte:"4m",tip:"Inheems aan kust, windbestendig en droogteresistent"}]},
  { n:"Hazelaar", l:"Corylus avellana", h:"middel", cat:"heester", blad:"bladverliezend", s:"voorjaar", b:"feb–mrt", c:"#a06820", licht:"zon", d:"Zon tot halfschaduw, goed gedraineerde grond. Vroege katjes in februari. Eetbare hazelnoten in september. 'Contorta' met gedraaide twijgen sierlijk in winter. Siercultivars met paars blad.", cv:[{name:"avellana",kleur:"gele katjes + bruine noten",hoogte:"5m",tip:"Gewone hazelaar — inheems, hazelnoten"},{name:"avellana 'Contorta'",kleur:"gele katjes",hoogte:"4m",tip:"Gedraaide twijgen — magisch siereffect in winter"},{name:"avellana 'Red Majestic'",kleur:"roze katjes + paars blad",hoogte:"3m",tip:"Paarsblad met gedraaide twijgen, roze katjes"},{name:"avellana 'Anny's Compact Red'",kleur:"roze katjes + paars blad",hoogte:"2.5m",tip:"Compact paars, geschikt voor kleine tuin"}]},
  { n:"Sieraalbes", l:"Ribes odoratum", h:"klein", cat:"heester", blad:"bladverliezend", s:"voorjaar", b:"apr–mei", c:"#f0d020", licht:"zon", d:"Volle zon, vrijwel elke grond. Geurende gele bloempjes in april-mei. Ribes odoratum (geurend) en sanguineum (rood bloeiend) zijn de twee siervormen van Muijderman.", cv:[{name:"odoratum",kleur:"geel geurend",hoogte:"2m",tip:"Kruidnagel-geur in voorjaar — opvallend"},{name:"sanguineum",kleur:"donkerrood",hoogte:"2m",tip:"Bloedbesstruik — rood bloeiend in april"}]},
  // BH-12: Speciale heesters (1)
  { n:"Russische salie", l:"Perovskia atriplicifolia", h:"klein", cat:"heester", blad:"bladverliezend", s:"zomer", b:"aug–sep", c:"#7788cc", licht:"zon", d:"Volle zon, droge arme goed gedraineerde grond. Lavendelblauwe bloemen boven zilverachtig aromatisch blad in aug-september. Terugsnoeien in het voorjaar. Droogtetolerant.", cv:[{name:"'Blue Spire'",kleur:"lila-blauw",hoogte:"1.2m",tip:"Meest geteeld, rijkst bloeiend"},{name:"'Little Spire'",kleur:"lila-blauw",hoogte:"0.8m",tip:"Compact — ideaal voor kleine border"}]},
  { n:"Struikmout", l:"Lavatera", h:"middel", cat:"heester", blad:"bladverliezend", s:"zomer", b:"jun–okt", c:"#dd88cc", licht:"zon", d:"Volle zon, goed gedraineerde arme grond. Bloeit onophoudelijk van juni tot de vorst. Snelle groeier. Terugsnoeien in het voorjaar. Snoeibeschadigingen vermijden door te wachten tot het vriest.", cv:[{name:"'Barnsley'",kleur:"wit-roze",hoogte:"2m",tip:"Wit met roze hart — klassiek en massaal bloeiend"},{name:"olbia 'Rosea'",kleur:"donkerroze",hoogte:"2m",tip:"Diepste roze bij struiklavendel"},{name:"'Burgundy Wine'",kleur:"bordeauxroze",hoogte:"1.5m",tip:"Donkerwijnrood — sierlijk"},{name:"'Candy Floss'",kleur:"lichtroze",hoogte:"1.5m",tip:"Pastelroze, lang bloeiend"},{name:"'Ice Cool'",kleur:"wit",hoogte:"1.5m",tip:"Zuiverwit, fris"},{name:"'Blue Bird'",kleur:"lila",hoogte:"1.5m",tip:"Lila tinten bij lavatera — zeldzaam"},{name:"'Red Rum'",kleur:"donkerrood",hoogte:"1.5m",tip:"Diepst bloeiend rood"}]},
  { n:"Fothergilla", l:"Fothergilla", h:"klein", cat:"heester", blad:"bladverliezend", s:"voorjaar", b:"apr–mei", c:"#f8f0e0", licht:"halfschaduw", d:"Halfschaduw, zure humeuze vochthoudende grond. Witte borstelachtige bloempjes in april-mei vóór het blad. Prachtige herfstkleur in rood, oranje en geel. Plant op zure grond — vergelijkbaar met hamamelis.", cv:[{name:"gardenii",kleur:"wit + herfstkleur",hoogte:"1m",tip:"Compactste soort, goede herfstkleur"},{name:"major",kleur:"wit + herfstkleur",hoogte:"3m",tip:"Grotere soort, spectaculaire herfstkleur"},{name:"x intermedia 'Blue Shadow'",kleur:"wit + blauwgroen blad",hoogte:"1.5m",tip:"Blauwgroen blad + witte bloem + herfstkleur — driezijdig"}]},
  { n:"Enkianthus", l:"Enkianthus campanulatus", h:"middel", cat:"heester", blad:"bladverliezend", s:"voorjaar", b:"mei", c:"#f8d8d0", licht:"halfschaduw", d:"Halfschaduw, zure humeuze grond. Hangende klokvormige bloempjes in mei. Prachtige rode-oranje herfstkleur. Langzame groeier — geduldige aanpak beloond.", cv:[{name:"campanulatus",kleur:"roomwit met rode nerven",hoogte:"4m",tip:"Sierlijke hangende bloemen, spectaculaire herfst"},{name:"campanulatus 'Red Bells'",kleur:"rood",hoogte:"2.5m",tip:"Donkerrode bloemen, compact"}]},
  { n:"Hemelbamboe", l:"Nandina domestica", h:"klein", cat:"heester", blad:"groenblijvend", s:"zomer", b:"jun–aug", c:"#cc2222", licht:"halfschaduw", d:"Halfschaduw, goed gedraineerde grond. Bamboefijn geveerd blad kleurt rood in de herfst en winter. Geen echte bamboe maar behoort tot de berberissenfamilie. Kleine witte bloemen gevolgd door rode bessen.", cv:[{name:"domestica",kleur:"wit + rode bessen",hoogte:"2m",tip:"Meest robuust, volledig assortiment"},{name:"'Firepower'",kleur:"rood winter + geel-rood blad",hoogte:"0.8m",tip:"Laagste en kleurrijkste — rood in de winter"},{name:"'Gulfstream'",kleur:"rood-geel wisselend blad",hoogte:"1.2m",tip:"Compact en kleurwisselend door het seizoen"},{name:"'Obsessed'",kleur:"donkerrood blad",hoogte:"1m",tip:"Sterkst rood blad jaarrond"},{name:"'Lemon en Lime'",kleur:"geel-groen blad",hoogte:"1m",tip:"Geel-groen — verfrissende tegenhanger"}]},
  { n:"Californische sering", l:"Ceanothus", h:"klein", cat:"heester", blad:"groenblijvend", s:"voorjaar", b:"mei–jun", c:"#4466cc", licht:"zon", d:"Volle zon, goed gedraineerde arme grond. Diepblauwe wolkjes bloemen in mei-juni. Winterhard in beschutte ligging; tegen een zonnige muur optimaal. Niet terugsnoeien in oud hout.", cv:[{name:"'Autumnal Blue'",kleur:"blauw",hoogte:"3m",tip:"Hardste soort, ook herfstbloei"},{name:"'Blue Mound'",kleur:"hemelsblauw",hoogte:"1.5m",tip:"Compact, rijkbloeiend in mei"},{name:"'Cascade'",kleur:"poederblauw",hoogte:"3m",tip:"Breed uitgroeiend, overvloedig"},{name:"impressus 'Puget Blue'",kleur:"diepblauw",hoogte:"3m",tip:"Meest intensieve kleur, kleine bladeren"},{name:"thyrsiflorus 'Skylark'",kleur:"blauw",hoogte:"2.5m",tip:"Opgaand, compact, bloeirijkst"},{name:"'Concha'",kleur:"kobaltblauw",hoogte:"3m",tip:"Rijkbloeiende cultivar, knoppen donkerroze"}]},
  { n:"Winterbloeiende kamperfoelie", l:"Lonicera fragrantissima", h:"middel", cat:"heester", blad:"bladverliezend", s:"winter", b:"jan–mrt", c:"#f8f8f0", licht:"halfschaduw", d:"Halfschaduw tot zon, goed gedraineerde grond. Bloeit midden in de winter met kleine crèmewitte bloemen die intens geuren. Eén van de meest geurige winterbloeiers. Bladeren half-groenblijvend. Geschikt als solitair of in gemengde haag.", cv:[{name:"fragrantissima",kleur:"crèmewit, sterk geurend",hoogte:"2m",tip:"Klassieke winterbloeiende soort"},{name:"x purpusii 'Winter Beauty'",kleur:"wit, extra geurend",hoogte:"2.5m",tip:"Hybride met langere bloeitijd — dec tot maart"}]},
  { n:"Blauwe kamperfoelie", l:"Lonicera caerulea", h:"klein", cat:"heester", blad:"bladverliezend", s:"voorjaar", b:"apr–mei", c:"#8899dd", licht:"halfschaduw", d:"Halfschaduw, vochtiger grond. Geeft eetbare blauwe bessen (haskap/honingbes). Kleine gele bloemetjes vroeg in het voorjaar. Frost-hard tot -40°C. Struikvorm — geen klimmer. Bessen zoetzuur, rijk aan antioxidanten.", cv:[{name:"'Morena'",kleur:"geel bloem / blauwe bes",hoogte:"1.5m",tip:"Hoogrenderend bessenras"},{name:"'Wojtek'",kleur:"geel bloem / blauwe bes",hoogte:"1.5m",tip:"Complementaire bestuiver voor Morena"},{name:"'Blue Moon'",kleur:"geel bloem / blauwe bes",hoogte:"1.5m",tip:"Late bloeier, grote bessen"}]},
  { n:"Abelia", l:"Abelia", h:"klein", cat:"heester", blad:"groenblijvend", s:"zomer", b:"jul–okt", c:"#ffccdd", licht:"halfschaduw", d:"Halfschaduw tot zon, goed gedraineerde grond. Lang bloeiend van juli tot oktober met kleine klokvormige bloempjes. Glanzend blad, deels groenblijvend in zachte winters. Bijvriendelijk. Beschut planten in rauwe klimaten.", cv:[{name:"grandiflora",kleur:"wit-roze",hoogte:"2m",tip:"Meest geteelde soort, lange bloeitijd"},{name:"grandiflora 'Confetti'",kleur:"wit-roze + bont blad",hoogte:"1m",tip:"Bontbladig — crème-groen"},{name:"grandiflora 'Francis Mason'",kleur:"wit-roze + goudrand",hoogte:"1.5m",tip:"Goudgerande bladeren, bijzonder"},{name:"x grandiflora 'Kaleidoscope'",kleur:"wit + meerkleurig blad",hoogte:"0.8m",tip:"Blad in geel, groen en oranje — kleurrijk jaarrond"}]},
  { n:"Himalayabloesem", l:"Leycesteria formosa", h:"middel", cat:"heester", blad:"bladverliezend", s:"zomer", b:"jul–sep", c:"#8844aa", licht:"halfschaduw", d:"Halfschaduw, vochthoudende grond. Lange hangende trossen met witte bloempjes en paarse schutbladeren van juli tot september. Donkerpurperen bessen daarna. Oud hout terugsnoeien in het voorjaar. Holle groene twijgen.", cv:[{name:"formosa",kleur:"wit + paarse schutbladeren",hoogte:"2m",tip:"Klassiek, lang bloeiend, vogels eten bessen"},{name:"'Gold Leaf'",kleur:"wit + goudgroen blad",hoogte:"1.5m",tip:"Goudgeel blad geeft extra contrast"}]},
  { n:"Indigostruik", l:"Indigofera", h:"klein", cat:"heester", blad:"bladverliezend", s:"zomer", b:"jul–sep", c:"#cc6699", licht:"zon", d:"Volle zon, goed gedraineerde grond. Roze-paarse erwtenbloemen van juli tot september op gebogen takken. Kruidachtig terugvriezen in koude winters, maar schiet krachtig terug uit de voet. Subtropische elegantie in de tuin.", cv:[{name:"heterantha",kleur:"roze-paars",hoogte:"1.5m",tip:"Meest verkochte soort, rijkbloeiend"},{name:"amblyantha",kleur:"roze",hoogte:"1.5m",tip:"Iets kleiner blad, vergelijkbare bloei"},{name:"kirilowii",kleur:"roze",hoogte:"1m",tip:"Compacter, geschikt voor kleine tuinen"}]},
  { n:"Camelia", l:"Camellia", h:"middel", cat:"heester", blad:"groenblijvend", s:"voorjaar", b:"feb–apr", c:"#ee4466", licht:"halfschaduw", d:"Halfschaduw, zure humeuze grond (pH 5–6). Vroege bloei van februari tot april met grote roos- of theebloem-achtige bloemen. Beschutten tegen ochtendzon bij vorst — bevroren knoppen ontdooien anders te snel. Hoge pH vermijden.", cv:[{name:"japonica 'Adolphe Audusson'",kleur:"donkerrood",hoogte:"3m",tip:"Grote halfgevulde rode bloemen — betrouwbaar"},{name:"japonica 'Elegans'",kleur:"roze met crème centrum",hoogte:"3m",tip:"Grote anemoonvorm — klassiek"},{name:"japonica 'Nobilissima'",kleur:"wit",hoogte:"3m",tip:"Vroegste witte japonica"},{name:"japonica 'Coquettii'",kleur:"rood",hoogte:"2.5m",tip:"Diepste rood, gevuld"},{name:"x williamsii 'Donation'",kleur:"roze",hoogte:"3m",tip:"Meest winterharde soort, rijkst bloeiend"},{name:"x williamsii 'Anticipation'",kleur:"dieprose",hoogte:"3m",tip:"Groot gevuld — lang bloeiend"},{name:"x williamsii 'Jury's Yellow'",kleur:"geel centrum wit rand",hoogte:"2.5m",tip:"Enige geel-witte camelia — bijzonder"},{name:"sinensis",kleur:"wit (thee)",hoogte:"3m",tip:"Echte theeplant — historisch en decoratief"}]},
  { n:"Kaneelstruik", l:"Calycanthus floridus", h:"middel", cat:"heester", blad:"bladverliezend", s:"zomer", b:"mei–aug", c:"#882200", licht:"halfschaduw", d:"Halfschaduw, vochthoudende humeuze grond. Donkerbruinrode bloemen met kaneelgeur van mei tot augustus. Blad ruikt ook kaneelachtig bij wrijven. Geen snoei nodig. Bijzondere kleur en geur — een echte solitair.", cv:[{name:"floridus",kleur:"wijnrood-bruin",hoogte:"2.5m",tip:"Geurende kaneelstruik — zeldzaam en bijzonder"},{name:"'Michael Lindsey'",kleur:"donkerbruin-rood",hoogte:"2.5m",tip:"Rijker bloeiend dan de soort"},{name:"x raulstonii 'Hartlage Wine'",kleur:"robijnrood",hoogte:"3m",tip:"Hybride met grotere bloemen en langere bloeitijd"}]},
  { n:"Kwastroos", l:"Garrya elliptica", h:"middel", cat:"heester", blad:"groenblijvend", s:"winter", b:"jan–feb", c:"#ccddbb", licht:"halfschaduw", d:"Halfschaduw, goed gedraineerde grond. Lange zilverachtige katjes tot 30 cm in januari-februari. Groenblijvend golvend blad. Geschikt voor koele noordwand. Vrij beschut planten — gevoelig voor harde oostenwind.", cv:[{name:"elliptica",kleur:"zilvergroen katjes",hoogte:"4m",tip:"Meest geteelde — lang katjes"},{name:"elliptica 'James Roof'",kleur:"extra lange zilverkatjes",hoogte:"5m",tip:"Langste katjes tot 35 cm — indrukwekkend"}]},
  { n:"Loropetalum", l:"Loropetalum chinense", h:"klein", cat:"heester", blad:"groenblijvend", s:"voorjaar", b:"mrt–mei", c:"#cc2288", licht:"halfschaduw", d:"Halfschaduw, zure humeuze grond. Exotische lintvormige bloemen in roze of wit. Paarsrood blad bij de roze cultivars. Goed beschutten in koude winters — niet volledig winterhard in strenge omstandigheden.", cv:[{name:"chinense var. rubrum 'Fire Dance'",kleur:"dieprose linten + bordeauxrood blad",hoogte:"2m",tip:"Meest opvallend — roze bloem + paars blad"},{name:"chinense 'Blush'",kleur:"lichtroze",hoogte:"2m",tip:"Zachter roze, geschikt voor warme ligging"},{name:"chinense f. album",kleur:"wit",hoogte:"2m",tip:"Witte variant, groen blad"}]},
  { n:"Zoete Itea", l:"Itea virginica", h:"klein", cat:"heester", blad:"bladverliezend", s:"zomer", b:"jun–aug", c:"#f8f8e8", licht:"halfschaduw", d:"Halfschaduw, vochthoudende humeuze grond. Lange witte geurende kaarsrechte bloemtrossen in juni-augustus. Prachtige rode-paarse herfstkleur. Trekt vlinders aan. Goed voor natte plekken, oever.", cv:[{name:"virginica",kleur:"wit, geurend",hoogte:"1.5m",tip:"Lange geurige bloeitrossen, rode herfstkleuring"},{name:"virginica 'Henry's Garnet'",kleur:"wit + dieppaarse herfstkleur",hoogte:"1.5m",tip:"Rijkste herfstkleur van allemaal"},{name:"ilicifolia",kleur:"crèmewit",hoogte:"3m",tip:"Groenblijvende Itea — katjesachtige trossen"}]},
  { n:"Jeneverbes", l:"Juniperus", h:"klein", cat:"conifeer", blad:"groenblijvend", s:"voorjaar", b:"apr (bessen: herfst)", c:"#668866", licht:"zon", d:"Volle zon, goed gedraineerde droge grond. Grote variatie in groeivormen — van bodembedekkers tot zuilen. Blauwe-groene naalden, giftige blauwe bessen (sier). Uitstekend voor droge en arme standplaatsen.", cv:[{name:"communis 'Hibernica'",kleur:"zilvergroen",hoogte:"4m",tip:"Strakke zuilvorm, Irish juniper"},{name:"communis 'Green Carpet'",kleur:"heldergroen",hoogte:"0.3m",tip:"Laagste vlakke bodembedekker"},{name:"communis 'Repanda'",kleur:"groen",hoogte:"0.3m",tip:"Breed kruipend — veel geteeld"},{name:"horizontalis 'Blue Chip'",kleur:"blauwgrijs",hoogte:"0.3m",tip:"Blauwst kruipend"},{name:"horizontalis 'Wiltonii'",kleur:"zilverblauw",hoogte:"0.2m",tip:"Plat kruipend, mooiste blauw"},{name:"squamata 'Blue Star'",kleur:"staalblauwe naalden",hoogte:"0.5m",tip:"Bol-compact, meest gebruikte"},{name:"squamata 'Blue Carpet'",kleur:"blauwgrijs",hoogte:"0.4m",tip:"Bred kruipend, blauwgrijs"},{name:"x pfitzeriana 'Pfitzeriana Glauca'",kleur:"blauwgroen",hoogte:"2m",tip:"Breed uitgroeiend, klassiek"},{name:"chinensis 'Stricta'",kleur:"blauwgroen",hoogte:"3m",tip:"Kegelvorm, blauwgroen"},{name:"scopulorum 'Skyrocket'",kleur:"blauwgrijs",hoogte:"6m",tip:"Smalste zuil, indrukwekkende hoogte"}]},

function kleurBg(kleur, fallback) {
  const k = kleur.toLowerCase().replace(/\u00ad/g, '').trim();
  if (_KLEUR_MAP[k]) return _KLEUR_MAP[k];
  const delen = k.split(/[-\s]+/);
  const gevonden = delen.map(d => _KLEUR_MAP[d]).filter(Boolean);
  if (gevonden.length >= 2) return `linear-gradient(to right, ${gevonden[0]} 50%, ${gevonden[1]} 50%)`;
  if (gevonden.length === 1) return gevonden[0];
  return fallback;
}

// AFBEELDINGEN (Wikipedia thumbnail, lazy)
// ============================================================
function laadAfbeelding(el) {
  el.dataset.gevraagd = '1';
  imgObserver.unobserve(el);
  const lat = el.dataset.lat.replace(/ /g, '_');
  fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(lat)}`)
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      const url = data.thumbnail?.source;
      if (!url) { el.classList.add('geladen'); return; }
      const img = el.querySelector('img');
      img.onload = () => { img.classList.add('geladen'); el.classList.add('geladen'); };
      img.src = url;
    })
    .catch(() => el.classList.add('geladen'));
}

  const lichtLabel = p.licht==='schaduw' ? '🌑 schaduw' : p.licht==='halfschaduw' ? '🌤 halfschaduw' : '☀️ zon';
  const bladPill = p.blad==='groenblijvend' ? 'pill-groenblijvend' : 'pill-bladverliezend';
  const bladLabel = p.blad==='groenblijvend' ? '🟢 groenblijvend' : '🍂 bladverliezend';
  const seizoenIcon = p.s==='winter' ? '❄️' : p.s==='herfst' ? '🍂' : p.s==='voorjaar' ? '🌱' : '☀️';
  const isFav = filter === 'favorieten';
  const cvList = isFav ? p.cv.filter(cv => favorieten.has(`${p.l}||${cv.name}`)) : p.cv;
  const cvHTML = cvList.map(cv => {
    const id = `${p.l}||${cv.name}`;
    const starred = favorieten.has(id);
    return `<div class="cultivar">
      <div class="cv-header">
        <div><span class="cv-name">${cv.name}</span><span class="cv-height">· ${cv.hoogte}</span></div>
        <div style="display:flex;gap:0.3rem;align-items:center">
          <button class="cv-fav${starred?' active':''}" data-fav="${id}" title="Favoriet">${starred?'★':'☆'}</button>
          <a class="cv-photo" href="${glink(p.l,cv.name)}" target="_blank" rel="noopener">📷 foto</a>
        </div>
      </div>
      <div class="cv-color"><span class="cv-dot" style="background:${kleurBg(cv.kleur, p.c)}"></span><span class="cv-kleur">${cv.kleur}</span></div>
      <div class="cv-tip">${cv.tip}</div>
    </div>`;
  }).join('');
  return `<div class="card">
    <div class="card-img" data-lat="${p.l}" data-kleur="${p.c}" style="background:${p.c}20">
      ${plantSVG(p.cat, p.c)}
      <img alt="${p.l}">
      <a class="photo-link" href="${glink(p.l,'')}" target="_blank" rel="noopener">📷</a>
    </div>
    <div class="card-body">
      <div class="badges">
        <span class="badge badge-${p.h}" style="background:${hBg[p.h]};color:${hTx[p.h]}">${hLb[p.h]}</span>
        <span class="badge ${catBadge}">${p.cat}</span>
      </div>
      <div class="card-name">${p.n}</div>
      <div class="card-latin">${p.l}</div>
      <div class="pills">
        <span class="pill ${lichtPill}">${lichtLabel}</span>
        <span class="pill ${bladPill}">${bladLabel}</span>
        <span class="pill pill-bloom">${seizoenIcon} ${p.b}</span>
      </div>
      <div class="card-desc">${p.d}</div>
    </div>
    <button class="cultivar-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.arr').textContent=this.nextElementSibling.classList.contains('open')?'▲':'▼'">
      <span>🌳 ${cvList.length} varianten</span><span class="arr">${isFav?'▲':'▼'}</span>
    </button>
    <div class="cultivars${isFav?' open':''}">${cvHTML}</div>
  </div>`;
}

// ============================================================
// FILTEREN & RENDEREN
// ============================================================
function applyFilter() {
  filtered = PLANTS.filter(p => {
    const mf = filter==='favorieten'
      ? p.cv.some(cv => favorieten.has(`${p.l}||${cv.name}`))
      : filter==='all' || p.h===filter || p.s===filter || p.cat===filter;
    const ml = filterLicht==='all' || p.licht===filterLicht;
    const mb = filterBlad==='all' || p.blad===filterBlad;
    const ms = query==='' || p.n.toLowerCase().includes(query) || p.l.toLowerCase().includes(query);
    return mf && ml && mb && ms;
  });
  page = 1;
  document.getElementById('grid').innerHTML = '';
  const loader = document.getElementById('loader');
  do { renderMore(); }
  while ((page - 1) * PAGE < filtered.length && loader.getBoundingClientRect().top < window.innerHeight);
}

function renderMore() {
  if ((page - 1) * PAGE >= filtered.length) return;
  const grid = document.getElementById('grid');
  const loader = document.getElementById('loader');
  const slice = filtered.slice((page-1)*PAGE, page*PAGE);
  grid.insertAdjacentHTML('beforeend', slice.map(cardHTML).join(''));
  const allCards = grid.querySelectorAll('.card-img[data-lat]');
  Array.from(allCards).slice(-slice.length).forEach(el => imgObserver.observe(el));
  const shown = Math.min(page*PAGE, filtered.length);
  document.getElementById('count').textContent = shown + '/' + filtered.length;
  document.getElementById('hdr-count').textContent = PLANTS.length + ' soorten met cultivarvarianten · 📷 = Google foto\'s';
  if (filtered.length === 0 && filter === 'favorieten') {
    grid.innerHTML = '<p class="empty-msg">Nog geen favorieten. Open een plant, klik op ☆ bij een cultivar om hem op te slaan.</p>';
  }
  loader.textContent = shown < filtered.length ? 'Meer laden…'
    : filtered.length > 0 ? '— alle ' + filtered.length + ' soorten getoond —'
    : (filter === 'favorieten' ? '' : 'Geen planten gevonden');
  page++;
}

// ============================================================
// AFBEELDINGEN LAZY LADEN
// ============================================================
const imgObserver = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting && !e.target.dataset.gevraagd) laadAfbeelding(e.target); });
}, { rootMargin: '300px' });

// ============================================================
// INFINITE SCROLL
// ============================================================
const _loaderEl = document.getElementById('loader');
new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) renderMore();
}, { rootMargin: '200px' }).observe(_loaderEl);
window.addEventListener('scroll', () => {
  if (_loaderEl.getBoundingClientRect().top < window.innerHeight + 300) renderMore();
}, { passive: true });

// ============================================================
// EVENT LISTENERS
// ============================================================
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn || !btn.dataset.filter) return;
  document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filter = btn.dataset.filter;
  applyFilter();
});

document.getElementById('filters-licht').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn || !btn.dataset.licht) return;
  document.querySelectorAll('#filters-licht button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterLicht = btn.dataset.licht;
  applyFilter();
});

document.getElementById('filters-blad').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn || !btn.dataset.blad) return;
  document.querySelectorAll('#filters-blad button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterBlad = btn.dataset.blad;
  applyFilter();
});

document.getElementById('grid').addEventListener('click', e => {
  const btn = e.target.closest('.cv-fav');
  if (!btn) return;
  e.stopPropagation();
  const id = btn.dataset.fav;
  if (favorieten.has(id)) {
    favorieten.delete(id);
    btn.classList.remove('active');
    btn.textContent = '☆';
    if (filter === 'favorieten') applyFilter();
  } else {
    favorieten.add(id);
    btn.classList.add('active');
    btn.textContent = '★';
  }
  saveFav();
});

let debounce;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(debounce);
  debounce = setTimeout(() => { query = e.target.value.toLowerCase(); applyFilter(); }, 200);
});

// Init
applyFilter();
</script>
</body>
</html>
